# _data/faqs.yml
- q: "治喪期間有理髮、刮鬍子的禁忌嗎？"
  a: "傳統習俗為表達哀戚會不修邊幅。現代禮儀則建議維持基本整潔，肅穆的儀容是對逝者最好的致敬。"
- q: "懷孕家屬可以參加喪禮嗎？"
  a: "可以。建議在腰間繫上紅布以求心安，祥安禮儀師也會協助安排家屬在舒適且通風的位置。"
- q: "如何申請勞保喪葬津貼？"
  a: "家屬可備妥死亡證明、除戶謄本及金融帳戶影本，向勞保局提出申請，最高可領取3個月津貼。"
- q: "做七的日期一定要當天嗎？"
  a: "建議頭七與滿七務必正期辦理，其餘小七可視家族成員時間適度提前，這在現代禮俗中稱為「切七」。"
- q: "骨灰罈選購要注意什麼？"
  a: "首重材質的防潮性與硬度（如玉石、花崗岩）。祥安會依據存放環境（室內塔位或戶外環保葬）提供最適建議。"

---
layout: null
---
<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    {% include head.html %}
    <title>標籤搜尋 | 祥安生命</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { 
            --sa-green: #2d3e2a; 
            --sa-gold: #a68b5a; 
            --sa-bg: #fdfaf5; 
        }
        body { font-family: 'Noto Sans TC', sans-serif; background: #fff; margin: 0; padding-top: 100px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        
        /* 頁首標題區 */
        .tag-header { 
            text-align: center; 
            background: var(--sa-bg); 
            padding: 60px 0; 
            border-bottom: 1px solid #eee; 
            margin-top: -20px;
            margin-bottom: 50px;
        }
        .tag-header h1 { 
            font-family: 'Noto Serif TC', serif; 
            font-size: 2.2rem; 
            color: var(--sa-green); 
            margin: 0 0 15px 0; 
        }
        .tag-header span { color: var(--sa-gold); }
        .back-to-blog { 
            display: inline-block; 
            margin-top: 15px; 
            color: #666; 
            text-decoration: none; 
            font-size: 0.95rem; 
            transition: 0.3s;
        }
        .back-to-blog:hover { color: var(--sa-gold); }

        /* 使用與 blog.html 相同的網格系統 */
        .article-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); 
            gap: 35px; 
            padding-bottom: 80px; 
        }

        /* 沿用 blog.html 的卡片樣式 */
        .blog-card { 
            background: #fff; 
            border: 1px solid #eee; 
            border-radius: 16px; 
            overflow: hidden; 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
            display: flex; 
            flex-direction: column; 
            text-decoration: none; 
            color: inherit; 
            position: relative;
        }
        .blog-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); border-color: var(--sa-gold); }
        
        .card-img-wrapper { width: 100%; height: 220px; overflow: hidden; }
        .card-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .blog-card:hover .card-img { transform: scale(1.1); }

        .card-body { padding: 30px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-title { 
            font-family: 'Noto Serif TC', serif; 
            font-size: 1.35rem; 
            color: var(--sa-green); 
            margin-bottom: 15px; 
            line-height: 1.4; 
        }
        .card-desc { color: #666; font-size: 0.95rem; line-height: 1.7; margin-bottom: 20px; flex-grow: 1; }
        
        .card-footer { 
            border-top: 1px solid #f0f0f0; 
            padding-top: 20px; 
            font-size: 0.85rem; 
            color: #999;
            display: flex;
            justify-content: space-between;
        }

        #no-results { display: none; text-align: center; padding: 100px 0; color: #999; }

        @media (max-width: 768px) {
            .article-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    {% include header.html %}

    <header class="tag-header">
        <div class="container">
            <h1>關鍵字：<span>「<span id="current-tag-label"></span>」</span></h1>
            <a href="/blog.html" class="back-to-blog"><i class="fas fa-arrow-left"></i> 返回殯葬百科首頁</a>
        </div>
    </header>

    <div class="container">
        <div id="no-results">
            <i class="fas fa-search-minus" style="font-size: 3rem; margin-bottom: 20px; color: #eee;"></i>
            <p>目前沒有標籤為此關鍵字的文章。</p>
        </div>

        <div class="article-grid" id="tag-grid">
            {% for post in site.posts %}
            <article class="blog-card" data-tags="{{ post.tags | join: ',' }}">
                <div class="card-img-wrapper">
                    <img src="{{ post.image | default: 'images/default-blog.jpg' | relative_url }}" class="card-img" alt="{{ post.title }}">
                </div>
                <div class="card-body">
                    <h3 class="card-title">{{ post.title }}</h3>
                    <p class="card-desc">{{ post.description | truncate: 65 }}</p>
                    <div class="card-footer">
                        <span><i class="far fa-calendar-alt"></i> {{ post.date | date: "%Y/%m/%d" }}</span>
                        <span style="color:var(--sa-gold);">詳全文 <i class="fas fa-chevron-right"></i></span>
                    </div>
                </div>
                <a href="{{ post.url | relative_url }}" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:1;"></a>
            </article>
            {% endfor %}
        </div>
    </div>

    {% include footer.html %}

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tag = urlParams.get('tag');
        const tagLabel = document.getElementById('current-tag-label');
        const cards = document.querySelectorAll('.blog-card');
        const noResults = document.getElementById('no-results');
        
        if (tag) {
            tagLabel.textContent = tag;
            let found = 0;
            
            cards.forEach(card => {
                const postTags = card.dataset.tags.split(',');
                if (postTags.includes(tag)) {
                    card.style.display = 'flex';
                    found++;
                } else {
                    card.style.display = 'none';
                }
            });
            
            if (found === 0) {
                noResults.style.display = 'block';
            }
        } else {
            // 如果沒有 tag 參數，直接導回 blog 頁
            window.location.href = '/blog.html';
        }
    </script>
</body>
</html>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ page.url | absolute_url }}"
  },
  "headline": {{ page.title | jsonify }},
  "description": {{ page.description | jsonify }},
  "image": "{{ site.url }}{{ site.baseurl }}/{{ page.og_image | default: 'images/taboo-hero.jpg' }}",  
  "author": {
    "@type": "Organization",
    "name": "祥安生命專業禮儀團隊",
    "url": "{{ '/about.html' | absolute_url }}"
  },  
  "publisher": {
    "@type": "Organization",
    "name": "祥安生命有限公司",
    "logo": {
      "@type": "ImageObject",
      "url": "{{ '/images/logo.png' | absolute_url }}"
    }
  },
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "dateModified": "{{ site.time | date_to_xmlschema }}"
}
</script>

{% if page.has_faq %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "治喪期間有理髮、刮鬍子的禁忌嗎？",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "傳統習俗為表達哀戚會不修邊幅。現代禮儀則建議維持整潔，以肅穆的儀容是對逝者最好的致敬。"
      }
    },
    {
      "@type": "Question",
      "name": "懷孕家屬可以參加喪禮嗎？",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "可以。傳統上建議在腰間繫上紅布以隔絕磁場，祥安禮儀師也會協助安排家屬在舒適且通風的位置參與。"
      }
    }
  ]
}
</script>
{% endif %}

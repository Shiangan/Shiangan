<style>
    /* --- 核心層級與顯示修復 --- */
    :root {
        --deep-green: #1a241a;
        --gold-solid: #c5a059;
    }

    #navbar {
        position: fixed;
        top: 0; left: 0; width: 100%;
        display: flex; justify-content: center;
        padding: 20px 0; /* 縮小一點讓視覺更精緻 */
        z-index: 999999 !important; /* 絕對最高層級 */
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        background: transparent;
    }

    /* 捲動後的狀態 */
    #navbar.scrolled {
        padding: 10px 0;
        background: rgba(26, 36, 26, 0.98); /* 深綠色背景 */
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(197, 160, 89, 0.3);
    }

    .nav-wrapper {
        width: 92%;
        max-width: 1400px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    /* Logo 修正：移除 filter，保持原色 */
    .logo img { 
        height: 60px; 
        width: auto;
        filter: none !important; /* 強制移除任何濾鏡 */
        transition: 0.3s; 
    }
    #navbar.scrolled .logo img { height: 45px; }

    /* 桌機選單列 */
    .nav-links {
        display: flex;
        list-style: none;
        gap: 30px;
        margin: 0; padding: 0;
    }

    .nav-links > li { position: relative; }

    .nav-links > li > a {
        color: white;
        text-decoration: none;
        font-size: 1rem;
        font-weight: 500;
        letter-spacing: 1px;
        padding: 10px 0;
        display: block;
        transition: 0.3s;
    }
    .nav-links > li > a:hover { color: var(--gold-solid); }

    /* 下拉選單 */
    .submenu {
        position: absolute;
        top: 100%; left: 50%;
        transform: translateX(-50%) translateY(15px);
        background: #1e2b1e;
        width: 220px;
        padding: 15px 0;
        list-style: none;
        border: 1px solid var(--gold-solid);
        opacity: 0;
        visibility: hidden;
        transition: 0.3s ease;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* 桌機懸浮顯示 */
    @media (min-width: 1101px) {
        .nav-links li:hover .submenu {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
    }

    .submenu li a {
        color: rgba(255,255,255,0.9);
        text-decoration: none;
        padding: 12px 25px;
        display: block;
        font-size: 0.95rem;
    }
    .submenu li a:hover { color: var(--gold-solid); background: rgba(255,255,255,0.05); }

    /* 手機版按鈕 */
    .menu-toggle {
        display: none;
        color: var(--gold-solid);
        font-size: 1.8rem;
        cursor: pointer;
        padding: 10px;
        z-index: 1000001;
    }

    @media (max-width: 1100px) {
        .menu-toggle { display: block !important; }
        
        .nav-links {
            position: fixed;
            top: 0; right: -100%;
            width: 80%; height: 100vh;
            background: #1a241a;
            flex-direction: column;
            padding: 100px 50px;
            transition: 0.4s ease-in-out;
            z-index: 1000000;
        }

        .nav-links.active { right: 0; }

        .submenu { 
            position: static; transform: none !important; 
            opacity: 1; visibility: visible; 
            width: 100%; display: none; /* 點擊才展開 */
            background: rgba(0,0,0,0.2);
            box-shadow: none; border: none;
        }

        .nav-links li.show-submenu .submenu { display: block; margin-top: 10px; }
    }
</style>

<header id="navbar">
    <div class="nav-wrapper">
        <div class="logo">
            <a href="{{ site.baseurl }}/index.html">
                <img src="{{ site.baseurl }}/images/logo.png" alt="祥安生命">
            </a>
        </div>
        
        <nav>
            <ul class="nav-links" id="main-nav">
                <li><a href="{{ site.baseurl }}/index.html">首頁</a></li>
                <li><a href="{{ site.baseurl }}/about.html">關於祥安</a></li>
                <li class="has-submenu">
                    <a href="javascript:void(0)">生命禮儀服務 <i class="fas fa-chevron-down"></i></a>
                    <ul class="submenu">
                        <li><a href="{{ site.baseurl }}/services.html#buddhist-taoist">中式禮儀</a></li>
                        <li><a href="{{ site.baseurl }}/services.html#western-etiquette">西式禮儀</a></li>
                        <li><a href="{{ site.baseurl }}/services.html#eco-burial">環保葬專區</a></li>
                    </ul>
                </li>
                <li class="has-submenu">
                    <a href="javascript:void(0)">費用方案 <i class="fas fa-chevron-down"></i></a>
                    <ul class="submenu">
                        <li><a href="{{ site.baseurl }}/plans.html#basic">6.8萬方案</a></li>
                        <li><a href="{{ site.baseurl }}/plans.html#eighty-eight">8.8萬方案</a></li>
                        <li><a href="{{ site.baseurl }}/plans.html#seventeen-eight">17.8萬方案</a></li>
                    </ul>
                </li>
                <li><a href="{{ site.baseurl }}/blog.html">殯葬百科</a></li>
                <li><a href="{{ site.baseurl }}/order.html" style="color: var(--gold-solid); font-weight: bold;">花禮訂購</a></li>
            </ul>
        </nav>
        <div class="menu-toggle" id="menu-btn"><i class="fas fa-bars"></i></div>
    </div>
</header>

<script>
    (function() {
        document.addEventListener('DOMContentLoaded', function() {
            const navbar = document.getElementById('navbar');
            const menuBtn = document.getElementById('menu-btn');
            const navLinks = document.getElementById('main-nav');
            const hasSubmenus = document.querySelectorAll('.has-submenu');

            // 捲動變色邏輯
            window.addEventListener('scroll', function() {
                if (window.scrollY > 50) { navbar.classList.add('scrolled'); }
                else { navbar.classList.remove('scrolled'); }
            });

            // 手機版漢堡按鈕點擊
            menuBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                navLinks.classList.toggle('active');
                this.querySelector('i').classList.toggle('fa-bars');
                this.querySelector('i').classList.toggle('fa-times');
            });

            // 手機版下拉選單點擊
            hasSubmenus.forEach(item => {
                item.addEventListener('click', function(e) {
                    if (window.innerWidth <= 1100) {
                        e.stopPropagation();
                        this.classList.toggle('show-submenu');
                    }
                });
            });

            // 點擊空白處關閉選單
            document.addEventListener('click', function() {
                navLinks.classList.remove('active');
                menuBtn.querySelector('i').className = 'fas fa-bars';
            });
        });
    })();
</script>

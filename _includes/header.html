<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

<style>
/* --- 基礎變數與全局設定 --- */
:root {
    --nav-bg: #1a241a;
    --nav-gold: #c5a059;
    --nav-white: #ffffff;
    --nav-height-desktop: 80px;
    --nav-height-mobile: 70px;
    --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans TC', sans-serif; padding-top: var(--nav-height-desktop); }

/* --- 導航主容器 --- */
#universal-nav {
    position: fixed; top: 0; left: 0; width: 100%;
    height: var(--nav-height-desktop);
    background: var(--nav-bg);
    display: flex; justify-content: center;
    z-index: 10000;
    transition: var(--transition-smooth);
}

/* 捲動後縮小樣式 */
#universal-nav.is-scrolled {
    height: 65px;
    background: rgba(26, 36, 26, 0.98);
    box-shadow: 0 2px 15px rgba(0,0,0,0.3);
}

.nav-container {
    width: 90%; max-width: 1300px;
    display: flex; justify-content: space-between; align-items: center;
}

/* --- Logo --- */
.logo img {
    height: 50px; width: auto;
    transition: var(--transition-smooth);
}
#universal-nav.is-scrolled .logo img { height: 40px; }

/* --- 選單列表 --- */
.nav-menu {
    display: flex; list-style: none; gap: 5px;
}

.nav-item { position: relative; }

.nav-link {
    display: flex; align-items: center; gap: 5px;
    color: var(--nav-white); text-decoration: none;
    padding: 10px 18px; font-size: 1rem;
    transition: color 0.3s; white-space: nowrap;
}

.nav-link:hover { color: var(--nav-gold); }

/* --- 下拉選單 (電腦版) --- */
.dropdown-menu {
    position: absolute; top: 100%; left: 0;
    background: #243124; min-width: 220px;
    list-style: none; padding: 10px 0;
    opacity: 0; visibility: hidden;
    transform: translateY(10px);
    transition: var(--transition-smooth);
    border-top: 2px solid var(--nav-gold);
    box-shadow: 0 5px 20px rgba(0,0,0,0.4);
}

/* 電腦版 Hover 顯示 */
@media (min-width: 1025px) {
    .nav-item:hover > .dropdown-menu {
        opacity: 1; visibility: visible;
        transform: translateY(0);
    }
}

.dropdown-link {
    display: block; color: rgba(255,255,255,0.8);
    text-decoration: none; padding: 12px 20px;
    font-size: 0.95rem; transition: all 0.3s;
}

.dropdown-link:hover {
    background: rgba(197, 160, 89, 0.1);
    color: var(--nav-gold); padding-left: 25px;
}

/* --- 特殊按鈕 (花禮訂購) --- */
.btn-gold {
    border: 1px solid var(--nav-gold);
    color: var(--nav-gold) !important;
    border-radius: 4px; margin-left: 10px;
}
.btn-gold:hover { background: var(--nav-gold); color: #fff !important; }

/* --- 手機版漢堡按鈕 --- */
.menu-toggle {
    display: none; color: var(--nav-gold); font-size: 1.5rem; cursor: pointer;
}

/* --- 手機響應式 (1024px 以下) --- */
@media (max-width: 1024px) {
    body { padding-top: var(--nav-height-mobile); }
    #universal-nav { height: var(--nav-height-mobile); }
    
    .menu-toggle { display: block; }

    .nav-menu {
        position: fixed; top: var(--nav-height-mobile); right: -100%;
        width: 100%; height: calc(100vh - var(--nav-height-mobile));
        background: var(--nav-bg); flex-direction: column;
        padding: 20px 0; gap: 0; overflow-y: auto;
        transition: 0.4s ease-in-out;
    }

    .nav-menu.is-active { right: 0; }

    .nav-item { width: 100%; }
    
    .nav-link {
        padding: 18px 5%; border-bottom: 1px solid rgba(255,255,255,0.05);
        justify-content: space-between;
    }

    /* 手機版下拉調整 */
    .dropdown-menu {
        position: static; opacity: 1; visibility: visible;
        display: none; transform: none; background: rgba(0,0,0,0.2);
        box-shadow: none; border: none; padding: 0;
    }

    .nav-item.open > .dropdown-menu { display: block; }
    .nav-item.open .fa-chevron-down { transform: rotate(180deg); }
    
    .dropdown-link { padding: 15px 10%; border-bottom: 1px solid rgba(255,255,255,0.03); }
    
    .btn-gold { margin: 20px 5%; text-align: center; }
}
</style>

<header id="universal-nav">
    <div class="nav-container">
        <div class="logo">
            <a href="/">
                <img src="https://via.placeholder.com/150x50?text=LOGO" alt="Logo">
            </a>
        </div>

        <ul class="nav-menu" id="nav-menu">
            <li class="nav-item"><a href="/" class="nav-link">首頁</a></li>
            <li class="nav-item"><a href="/about" class="nav-link">關於祥安</a></li>
            
            <li class="nav-item has-dropdown">
                <a href="javascript:void(0)" class="nav-link">
                    生命禮儀服務 <i class="fas fa-chevron-down" style="font-size: 0.7rem;"></i>
                </a>
                <ul class="dropdown-menu">
                    <li><a href="/chinese" class="dropdown-link">中式禮儀服務</a></li>
                    <li><a href="/western" class="dropdown-link">西式禮儀服務</a></li>
                    <li><a href="/japanese" class="dropdown-link">日式禮儀服務</a></li>
                </ul>
            </li>

            <li class="nav-item has-dropdown">
                <a href="javascript:void(0)" class="nav-link">
                    服務契約方案 <i class="fas fa-chevron-down" style="font-size: 0.7rem;"></i>
                </a>
                <ul class="dropdown-menu">
                    <li><a href="/compare" class="dropdown-link" style="color:var(--nav-gold)">方案規格對照</a></li>
                    <li><a href="/deed01" class="dropdown-link">國民專案 6.8萬</a></li>
                    <li><a href="/deed02" class="dropdown-link">中式精緻 8.8萬</a></li>
                    <li><a href="/deed06" class="dropdown-link">正信佛教專案</a></li>
                </ul>
            </li>

            <li class="nav-item"><a href="/eco" class="nav-link">環保葬專區</a></li>
            <li class="nav-item"><a href="/order" class="nav-link btn-gold">花禮訂購</a></li>
        </ul>

        <div class="menu-toggle" id="mobile-toggle">
            <i class="fas fa-bars"></i>
        </div>
    </div>
</header>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const nav = document.getElementById('universal-nav');
    const menu = document.getElementById('nav-menu');
    const toggle = document.getElementById('mobile-toggle');
    const dropdowns = document.querySelectorAll('.has-dropdown');

    // 1. 處理滾動效果 (優化效能)
    window.addEventListener('scroll', () => {
        if (window.scrollY > 50) {
            nav.classList.add('is-scrolled');
        } else {
            nav.classList.remove('is-scrolled');
        }
    }, { passive: true });

    // 2. 手機版選單切換
    toggle.addEventListener('click', () => {
        menu.classList.toggle('is-active');
        toggle.querySelector('i').classList.toggle('fa-bars');
        toggle.querySelector('i').classList.toggle('fa-times');
    });

    // 3. 手機版下拉點擊處理
    dropdowns.forEach(item => {
        item.querySelector('.nav-link').addEventListener('click', (e) => {
            if (window.innerWidth <= 1024) {
                e.preventDefault();
                // 關閉其他已打開的
                dropdowns.forEach(other => {
                    if (other !== item) other.classList.remove('open');
                });
                // 切換目前的
                item.classList.toggle('open');
            }
        });
    });

    // 4. 點擊外部關閉選單
    document.addEventListener('click', (e) => {
        if (!nav.contains(e.target) && menu.classList.contains('is-active')) {
            menu.classList.remove('is-active');
            toggle.querySelector('i').classList.add('fa-bars');
            toggle.querySelector('i').classList.remove('fa-times');
        }
    });
});
</script>

<style>
:root{
    --deep-green:#0e160e;
    --gold:#d4b36a;
}

/* ===== NAVBAR ===== */
#navbar{
    position:fixed;
    top:0; left:0;
    width:100%;
    z-index:9999;
    background:linear-gradient(180deg,rgba(5,10,5,.55),rgba(5,10,5,.2));
    backdrop-filter:blur(16px);
    border-bottom:1px solid rgba(255,255,255,.08);
    transition:.45s ease;
}

#navbar.scrolled{
    background:rgba(10,18,10,.96);
    box-shadow:0 25px 70px rgba(0,0,0,.85);
}

/* ===== WRAPPER ===== */
.nav-wrapper{
    max-width:1400px;
    margin:auto;
    padding:18px 35px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* ===== LOGO ===== */
.logo img{
    height:64px;
    transition:.45s ease;
}
#navbar.scrolled .logo img{
    height:50px;
}

/* ===== DESKTOP MENU ===== */
.nav-links{
    display:flex;
    list-style:none;
    gap:45px;
}

.nav-links li{position:relative}

.nav-links a{
    color:#fff;
    text-decoration:none;
    font-size:1.05rem;
    letter-spacing:1px;
    padding:15px 0;
    display:block;
    position:relative;
    transition:.3s ease;
}

/* ===== 金色光暈 Hover ===== */
.nav-links a:after{
    content:"";
    position:absolute;
    bottom:0;
    left:50%;
    width:0%;
    height:2px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
    transition:.4s ease;
    transform:translateX(-50%);
}
.nav-links a:hover:after{
    width:100%;
}
.nav-links a:hover{
    color:var(--gold);
}

/* ===== DROPDOWN ===== */
.submenu{
    position:absolute;
    top:140%;
    left:0;
    min-width:260px;
    background:linear-gradient(145deg,#162316,#0a120a);
    border-radius:14px;
    padding:15px 0;
    opacity:0;
    visibility:hidden;
    transform:translateY(20px);
    transition:.4s ease;
    box-shadow:
        0 30px 70px rgba(0,0,0,.9),
        inset 0 0 40px rgba(255,255,255,.03);
}

.nav-links li:hover>.submenu{
    opacity:1;
    visibility:visible;
    transform:translateY(0);
}

.submenu li:hover>.submenu{
    left:100%;
    top:0;
    opacity:1;
    visibility:visible;
}

.submenu a{
    padding:14px 24px;
    font-size:.95rem;
    transition:.3s;
    border-radius:8px;
}
.submenu a:hover{
    background:rgba(255,212,106,.08);
    color:var(--gold);
}

/* ===== MOBILE ===== */
.menu-toggle{
    display:none;
    font-size:2.2rem;
    color:var(--gold);
    cursor:pointer;
}

@media(max-width:1100px){

.menu-toggle{display:block}

/* ===== 手機側滑抽屜 ===== */
.nav-links{
    position:fixed;
    top:0;
    right:-100%;
    width:85%;
    height:100vh;
    background:rgba(10,20,10,.96);
    flex-direction:column;
    padding:140px 40px;
    transition:.5s cubic-bezier(.5,0,.2,1);
    backdrop-filter:blur(16px);
    box-shadow:-20px 0 60px rgba(0,0,0,.85);
    border-left:1px solid rgba(255,255,255,.05);
}

.nav-links.active{right:0}

.nav-links li{
    position:relative;
    margin-bottom:0;
}

.nav-links a{
    padding:20px 0;
    font-size:1.15rem;
    transition:.3s ease;
}

/* 手風琴效果 */
.submenu{
    position:static;
    opacity:1;
    visibility:visible;
    transform:none;
    display:none;
    background:linear-gradient(145deg,rgba(255,255,255,.02),rgba(255,255,255,.05));
    border-radius:12px;
    margin:8px 0;
    padding-left:25px;
    box-shadow: inset 0 0 15px rgba(0,0,0,.2);
    transition:.4s ease;
}

.has-submenu.open>.submenu{
    display:block;
}

.submenu a{
    font-size:1rem;
    padding:14px 20px;
    border-radius:8px;
    transition:.3s ease;
}

.submenu a:hover{
    background:rgba(255,212,106,.08);
    color:var(--gold);
}
}
</style>

<header id="navbar">
<div class="nav-wrapper">

<div class="logo">
<a href="{{ site.baseurl }}/">
<img src="{{ 'images/logo.png' | relative_url }}" alt="祥安生命禮儀公司">
</a>
</div>

<nav aria-label="網站主要導覽">
<ul class="nav-links" id="mainNav">

<li><a href="{{ site.baseurl }}/">首頁</a></li>
<li><a href="{{ '/about.html' | relative_url }}">關於祥安</a></li>

<li class="has-submenu">
<a href="#" class="toggle">喪葬禮儀服務 ▾</a>
<ul class="submenu">

<li class="has-submenu">
<a href="#" class="toggle">中式禮儀 ▾</a>
<ul class="submenu">
<li><a href="{{ '/services.html#chinese-customs' | relative_url }}">傳統習俗</a></li>
<li><a href="{{ '/services.html#buddhist' | relative_url }}">佛教儀式</a></li>
<li><a href="{{ '/services.html#taoist' | relative_url }}">道教儀式</a></li>
</ul>
</li>

<li class="has-submenu">
<a href="#" class="toggle">西式禮儀 ▾</a>
<ul class="submenu">
<li><a href="{{ '/services.html#christianity' | relative_url }}">基督教</a></li>
<li><a href="{{ '/services.html#catholic' | relative_url }}">天主教</a></li>
</ul>
</li>

<li><a href="{{ '/services.html#eco-burial' | relative_url }}">環保葬</a></li>

</ul>
</li>

<li><a href="{{ '/plans.html' | relative_url }}">費用方案</a></li>
<li><a href="{{ '/blog.html' | relative_url }}">治喪百科</a></li>

</ul>
</nav>

<div class="menu-toggle" id="menuBtn">☰</div>

</div>
</header>

<script>
document.addEventListener("DOMContentLoaded",()=>{

const nav=document.getElementById("navbar");
const btn=document.getElementById("menuBtn");
const menu=document.getElementById("mainNav");

/* 滾動效果 */
window.addEventListener("scroll",()=>{
 nav.classList.toggle("scrolled",window.scrollY>50);
});

/* 手機抽屜開關 */
btn.onclick=()=>menu.classList.toggle("active");

/* 手機手風琴 */
document.querySelectorAll(".toggle").forEach(link=>{
 link.onclick=e=>{
  if(window.innerWidth<1100){
   e.preventDefault();
   link.parentElement.classList.toggle("open");
  }
 };
});

});
</script>

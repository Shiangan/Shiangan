<style>
    :root {
        --deep-green: #1a241a;
        --gold-solid: #c5a059;
    }

    #navbar {
        position: fixed;
        top: 0; left: 0; width: 100%;
        display: flex; justify-content: center;
        padding: 20px 0;
        z-index: 1000; /* 設為 1000 即可，避免過大影響其他元件 */
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        background: transparent;
    }

    #navbar.scrolled {
        padding: 10px 0;
        background: rgba(26, 36, 26, 0.98);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(197, 160, 89, 0.3);
    }

    .nav-wrapper {
        width: 92%;
        max-width: 1400px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .logo img { 
        height: 60px; 
        width: auto;
        filter: none !important;
        transition: 0.3s; 
    }
    #navbar.scrolled .logo img { height: 45px; }

    .nav-links {
        display: flex;
        list-style: none;
        gap: 30px;
        margin: 0; padding: 0;
    }

    .nav-links > li { position: relative; }

    .nav-links > li > a {
        color: white;
        text-decoration: none;
        font-size: 1rem;
        font-weight: 500;
        letter-spacing: 1px;
        padding: 10px 0;
        display: block;
        transition: 0.3s;
    }
    .nav-links > li > a:hover { color: var(--gold-solid); }

    /* 下拉選單基礎樣式 */
    .submenu {
        position: absolute;
        top: 100%; left: 50%;
        transform: translateX(-50%) translateY(15px);
        background: #1e2b1e;
        width: 220px;
        padding: 15px 0;
        list-style: none;
        border: 1px solid var(--gold-solid);
        opacity: 0;
        visibility: hidden;
        transition: 0.3s ease;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    @media (min-width: 1101px) {
        .nav-links li:hover .submenu {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
    }

    .submenu li a {
        color: rgba(255,255,255,0.9);
        text-decoration: none;
        padding: 12px 25px;
        display: block;
        font-size: 0.95rem;
    }
    .submenu li a:hover { color: var(--gold-solid); background: rgba(255,255,255,0.05); }

    .menu-toggle {
        display: none;
        color: var(--gold-solid);
        font-size: 1.8rem;
        cursor: pointer;
        padding: 10px;
    }

    /* 手機版樣式修正 */
    @media (max-width: 1100px) {
        .menu-toggle { display: block !important; }
        
        .nav-links {
            position: fixed;
            top: 0; right: -100%;
            width: 80%; height: 100vh;
            background: var(--deep-green);
            flex-direction: column;
            padding: 100px 40px;
            transition: 0.4s ease-in-out;
            overflow-y: auto; /* 避免選單太長刷不動 */
        }

        .nav-links.active { right: 0; }

        .submenu { 
            position: static; transform: none !important; 
            opacity: 1; visibility: visible; 
            width: 100%; display: none;
            background: rgba(0,0,0,0.3);
            border: none; box-shadow: none;
            padding: 0; margin-top: 10px;
        }

        .nav-links li.show-submenu .submenu { display: block; }
        .nav-links li.has-submenu > a i { transition: 0.3s; }
        .nav-links li.show-submenu > a i { transform: rotate(180deg); }
    }
</style>

                    <ul class="submenu">

                <li class="dropdown" role="menuitem" tabindex="0" aria-haspopup="true">
    <a href="blog.html" aria-expanded="false">服務案例與百科 <i class="fas fa-chevron-down"></i></a>

<script>
    (function() {
        document.addEventListener('DOMContentLoaded', function() {
            const navbar = document.getElementById('navbar');
            const menuBtn = document.getElementById('menu-btn');
            const navLinks = document.getElementById('main-nav');
            const hasSubmenus = document.querySelectorAll('.has-submenu');

            // 捲動變色
            window.addEventListener('scroll', function() {
                if (window.scrollY > 50) { navbar.classList.add('scrolled'); }
                else { navbar.classList.remove('scrolled'); }
            });

            // 手機版開關
            menuBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                navLinks.classList.toggle('active');
                const icon = this.querySelector('i');
                icon.classList.toggle('fa-bars');
                icon.classList.toggle('fa-times');
            });

            // 手機版下拉選單切換
            hasSubmenus.forEach(item => {
                const link = item.querySelector('a');
                link.addEventListener('click', function(e) {
                    if (window.innerWidth <= 1100) {
                        e.preventDefault();
                        e.stopPropagation();
                        item.classList.toggle('show-submenu');
                    }
                });
            });

            // 點擊選單外部自動關閉
            document.addEventListener('click', function() {
                if (navLinks.classList.contains('active')) {
                    navLinks.classList.remove('active');
                    menuBtn.querySelector('i').className = 'fas fa-bars';
                }
            });

            // 防止點擊選單內部時關閉自身
            navLinks.addEventListener('click', function(e) {
                e.stopPropagation();
            });
        });
    })();
</script>

<style>
:root{
    --deep-green:#1a241a;
    --gold:#c5a059;
}

/* NAVBAR */
#navbar{
    position:fixed;
    top:0; left:0;
    width:100%;
    z-index:9999;
    background:transparent;
    transition:.35s;
}

#navbar.scrolled{
    background:rgba(26,36,26,.96);
    backdrop-filter:blur(10px);
    box-shadow:0 5px 25px rgba(0,0,0,.4);
}

.nav-wrapper{
    max-width:1400px;
    margin:auto;
    padding:10px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo img{height:60px}

/* DESKTOP */
.nav-links{
    display:flex;
    list-style:none;
    gap:35px;
}

.nav-links li{position:relative}

.nav-links a{
    color:#fff;
    text-decoration:none;
    font-size:1.05rem;
    padding:12px 0;
    display:block;
}

/* DROPDOWN */
.submenu{
    position:absolute;
    top:100%;
    left:0;
    background:#1e2b1e;
    min-width:230px;
    opacity:0;
    visibility:hidden;
    transform:translateY(10px);
    transition:.3s;
}

.nav-links li:hover>.submenu{
    opacity:1;
    visibility:visible;
    transform:translateY(0);
}

.submenu li:hover>.submenu{
    left:100%;
    top:0;
    opacity:1;
    visibility:visible;
}

/* MOBILE */
.menu-toggle{
    display:none;
    font-size:2rem;
    color:var(--gold);
    cursor:pointer;
}

@media(max-width:1100px){

.menu-toggle{display:block}

.nav-links{
    position:fixed;
    top:0;
    right:-100%;
    width:85%;
    height:100vh;
    background:var(--deep-green);
    flex-direction:column;
    padding:110px 25px;
    overflow-y:auto;
    gap:0;
    transition:.35s;
}

.nav-links.active{right:0}

.submenu{
    position:static;
    opacity:1;
    visibility:visible;
    transform:none;
    display:none;
    background:rgba(255,255,255,.06);
    padding-left:15px;
}

.has-submenu.open>.submenu{
    display:block;
}
}
</style>


<header id="navbar">
<div class="nav-wrapper">

<div class="logo">
<a href="{{ site.baseurl }}/">
<img src="{{ 'images/logo.png' | relative_url }}" alt="祥安生命有限公司">
</a>
</div>

<nav aria-label="網站主要導覽">
<ul class="nav-links" id="mainNav" role="menubar">

<li role="menuitem"><a href="{{ site.baseurl }}/">首頁</a></li>

<li role="menuitem"><a href="{{ '/about.html' | relative_url }}">關於祥安生命禮儀公司</a></li>

<li class="has-submenu">
<a href="#" class="toggle">喪葬禮儀服務 ▾</a>
<ul class="submenu">

<li class="has-submenu">
<a href="#" class="toggle">中式喪葬禮儀 ▾</a>
<ul class="submenu">
<li><a href="{{ '/services.html#chinese-customs' | relative_url }}">傳統喪葬習俗流程</a></li>
<li><a href="{{ '/services.html#buddhist' | relative_url }}">佛教喪禮儀式</a></li>
<li><a href="{{ '/services.html#taoist' | relative_url }}">道教告別式儀式</a></li>
</ul>
</li>

<li class="has-submenu">
<a href="#" class="toggle">西式告別式 ▾</a>
<ul class="submenu">
<li><a href="{{ '/services.html#christianity' | relative_url }}">基督教喪禮</a></li>
<li><a href="{{ '/services.html#catholic' | relative_url }}">天主教追思彌撒</a></li>
</ul>
</li>

<li><a href="{{ '/services.html#eco-burial' | relative_url }}">環保自然葬服務</a></li>

</ul>
</li>

<li role="menuitem"><a href="{{ '/plans.html' | relative_url }}">喪葬費用方案價格</a></li>

<li role="menuitem"><a href="{{ '/blog.html' | relative_url }}">治喪流程知識百科</a></li>

</ul>
</nav>

<div class="menu-toggle" id="menuBtn">☰</div>

</div>
</header>


<script>
document.addEventListener("DOMContentLoaded",()=>{

const nav=document.getElementById("navbar");
const btn=document.getElementById("menuBtn");
const menu=document.getElementById("mainNav");

window.addEventListener("scroll",()=>{
 nav.classList.toggle("scrolled",window.scrollY>50);
});

btn.onclick=()=>menu.classList.toggle("active");

document.querySelectorAll(".toggle").forEach(link=>{
 link.onclick=e=>{
  if(window.innerWidth<1100){
   e.preventDefault();
   link.parentElement.classList.toggle("open");
  }
 };
});

});
</script>

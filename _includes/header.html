<style>
    /* --- 核心層級與顯示修復 --- */
    :root {
        --deep-green: #1a241a;
        --gold-solid: #c5a059;
    }

    #navbar {
        position: fixed;
        top: 0; left: 0; width: 100%;
        display: flex; justify-content: center;
        padding: 25px 0;
        z-index: 99999 !important; /* 再次提升層級 */
        transition: all 0.5s ease;
        background: transparent;
    }

    #navbar.scrolled {
        padding: 12px 0;
        background: rgba(26, 36, 26, 0.98); /* 增加不透明度 */
        backdrop-filter: blur(15px);
        border-bottom: 1px solid rgba(197, 160, 89, 0.3);
    }

    .nav-wrapper {
        width: 92%;
        max-width: 1400px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: relative;
    }

    .logo img { height: 50px; filter: brightness(0) invert(1); transition: 0.3s; }
    #navbar.scrolled .logo img { height: 42px; }

    /* 桌機選單列 */
    .nav-links {
        display: flex;
        list-style: none;
        gap: clamp(15px, 2.5vw, 35px);
        margin: 0; padding: 0;
    }

    .nav-links > li > a {
        color: white;
        text-decoration: none;
        font-size: 0.95rem;
        letter-spacing: 1px;
        padding: 10px 0;
        display: block;
        transition: 0.3s;
    }
    .nav-links > li > a:hover { color: var(--gold-solid); }

    /* 下拉選單基礎樣式 */
    .submenu {
        position: absolute;
        top: 100%; left: 50%;
        transform: translateX(-50%) translateY(15px);
        background: #1e2b1e;
        width: 220px;
        padding: 10px 0;
        list-style: none;
        border: 1px solid rgba(197, 160, 89, 0.4);
        opacity: 0;
        visibility: hidden;
        transition: 0.3s ease;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        pointer-events: none; /* 防止遮擋 */
    }

    /* 桌機 Hover 邏輯 */
    @media (min-width: 1101px) {
        .nav-links li:hover .submenu {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }
    }

    .submenu li a {
        color: rgba(255,255,255,0.85);
        text-decoration: none;
        padding: 12px 25px;
        display: block;
        font-size: 0.9rem;
    }
    .submenu li a:hover { color: var(--gold-solid); background: rgba(255,255,255,0.05); }

    /* --- 手機版 UI 強制修復 --- */
    .menu-toggle {
        display: none;
        color: var(--gold-solid);
        font-size: 1.8rem;
        cursor: pointer;
        z-index: 100001; /* 確保在 nav-links 之上 */
        padding: 10px;
    }

    @media (max-width: 1100px) {
        .menu-toggle { display: block !important; }
        
        .nav-links {
            position: fixed;
            top: 0; right: -100%;
            width: 75%; height: 100vh;
            background: #1a241a;
            flex-direction: column;
            padding: 100px 30px;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100000;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        .nav-links.active { right: 0; }

        /* 手機下拉選單切換 */
        .submenu { 
            position: static; transform: none !important; 
            opacity: 1; visibility: visible; 
            width: 100%; background: rgba(0,0,0,0.2);
            display: none; /* 初始隱藏 */
            box-shadow: none; border: none; border-left: 1px solid var(--gold-solid);
            margin-left: 10px; pointer-events: auto;
        }

        .nav-links li.show-submenu .submenu {
            display: block;
            margin-top: 10px;
        }
        
        /* 手機版箭頭動畫 */
        .has-submenu > a i { transition: 0.3s; }
        .nav-links li.show-submenu > a i { transform: rotate(180deg); }
    }
</style>

<header id="navbar">
    <div class="nav-wrapper">
        <div class="logo">
            <a href="{{ site.baseurl }}/index.html">
                <img src="{{ site.baseurl }}/images/logo.png" alt="祥安生命">
            </a>
        </div>
        
        <nav>
            <ul class="nav-links" id="main-nav">
                <li><a href="{{ site.baseurl }}/index.html">首頁</a></li>
                <li><a href="{{ site.baseurl }}/about.html">關於祥安</a></li>
                <li class="has-submenu">
                    <a href="javascript:void(0)">專業生命禮儀 <i class="fas fa-chevron-down" style="font-size: 0.7rem; margin-left: 5px;"></i></a>
                    <ul class="submenu">
                        <li><a href="{{ site.baseurl }}/services.html#buddhist-taoist">中式禮儀 (佛/道教)</a></li>
                        <li><a href="{{ site.baseurl }}/services.html#western-etiquette">西式禮儀 (基/天主教)</a></li>
                        <li><a href="{{ site.baseurl }}/services.html#japanese-etiquette">日式禮儀 (日蓮正宗)</a></li>
                        <li><a href="{{ site.baseurl }}/services.html#eco-burial">環保葬 (樹/花/海葬)</a></li>
                    </ul>
                </li>
                <li class="has-submenu">
                    <a href="javascript:void(0)">喪葬費用方案 <i class="fas fa-chevron-down" style="font-size: 0.7rem; margin-left: 5px;"></i></a>
                    <ul class="submenu">
                        <li><a href="{{ site.baseurl }}/plans.html#basic">國民契約 6.8萬</a></li>
                        <li><a href="{{ site.baseurl }}/plans.html#eighty-eight">中式契約 8.8萬起</a></li>
                        <li><a href="{{ site.baseurl }}/plans.html#seventeen-eight">尊榮契約 17.8萬</a></li>
                    </ul>
                </li>
                <li><a href="{{ site.baseurl }}/blog.html">殯葬百科</a></li>
                <li><a href="{{ site.baseurl }}/order.html" style="color: var(--gold-solid); font-weight: bold;">花禮訂購</a></li>
            </ul>
        </nav>
        <div class="menu-toggle" id="menu-btn"><i class="fas fa-bars"></i></div>
    </div>
</header>

<script>
    (function() {
        document.addEventListener('DOMContentLoaded', function() {
            const navbar = document.getElementById('navbar');
            const menuBtn = document.getElementById('menu-btn');
            const navLinks = document.getElementById('main-nav');
            const hasSubmenus = document.querySelectorAll('.has-submenu');

            // 1. 捲動變色
            window.addEventListener('scroll', function() {
                if (window.scrollY > 30) { 
                    navbar.classList.add('scrolled'); 
                } else { 
                    navbar.classList.remove('scrolled'); 
                }
            }, { passive: true });

            // 2. 漢堡選單：點擊開關
            menuBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                navLinks.classList.toggle('active');
                const icon = this.querySelector('i');
                icon.classList.toggle('fa-bars');
                icon.classList.toggle('fa-times');
            });

            // 3. 手機版下拉選單：點擊展開
            hasSubmenus.forEach(item => {
                const link = item.querySelector('a');
                link.addEventListener('click', function(e) {
                    if (window.innerWidth <= 1100) {
                        e.preventDefault();
                        e.stopPropagation();
                        // 關閉其他子選單 (可選)
                        hasSubmenus.forEach(other => {
                            if (other !== item) other.classList.remove('show-submenu');
                        });
                        item.classList.toggle('show-submenu');
                    }
                });
            });

            // 4. 點擊外部關閉選單
            document.addEventListener('click', function(e) {
                if (navLinks.classList.contains('active') && !navLinks.contains(e.target) && e.target !== menuBtn) {
                    navLinks.classList.remove('active');
                    const icon = menuBtn.querySelector('i');
                    icon.classList.add('fa-bars');
                    icon.classList.remove('fa-times');
                }
            });

            // 5. 防止選單內點擊穿透到 body
            navLinks.addEventListener('click', function(e) {
                e.stopPropagation();
            });
        });
    })();
</script>

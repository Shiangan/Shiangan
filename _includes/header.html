<style>
:root{
    --deep-green:#1a241a;
    --gold:#c5a059;
}

/* NAV */
#navbar{
    position:fixed;
    top:0; left:0; width:100%;
    z-index:9999;
    background:transparent;
    transition:.35s;
}
#navbar.scrolled{
    background:rgba(26,36,26,.95);
    backdrop-filter:blur(10px);
    box-shadow:0 4px 20px rgba(0,0,0,.4);
}

.nav-wrapper{
    max-width:1400px;
    margin:auto;
    padding:10px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo img{height:60px}

/* DESKTOP MENU */
.nav-links{
    display:flex;
    list-style:none;
    gap:35px;
}
.nav-links a{
    color:#fff;
    text-decoration:none;
    font-size:1.05rem;
}

/* DROPDOWN */
.submenu{
    position:absolute;
    top:100%;
    left:0;
    background:#1e2b1e;
    min-width:230px;
    opacity:0;
    visibility:hidden;
    transition:.3s;
}
.nav-links li:hover>.submenu{
    opacity:1;
    visibility:visible;
}
.submenu li:hover>.submenu{
    left:100%;
    top:0;
    opacity:1;
    visibility:visible;
}

/* MOBILE */
.menu-toggle{
    display:none;
    font-size:1.8rem;
    color:var(--gold);
    cursor:pointer;
}

@media(max-width:1100px){

.menu-toggle{display:block}

/* slide menu */
.nav-links{
    position:fixed;
    top:0;
    right:-100%;
    width:85%;
    height:100vh;
    background:var(--deep-green);
    flex-direction:column;
    padding:110px 25px;
    overflow-y:auto;
    gap:5px;
    transition:.35s;
}
.nav-links.active{right:0}

/* accordion */
.submenu{
    position:static;
    opacity:1;
    visibility:visible;
    display:none;
    background:rgba(255,255,255,.06);
    padding-left:15px;
}
.has-submenu.open>.submenu{
    display:block;
}

}
</style>


<header id="navbar">
<div class="nav-wrapper">

<div class="logo">
<a href="{{ site.baseurl }}/">
<img src="{{ 'images/logo.png' | relative_url }}" alt="祥安生命">
</a>
</div>

<nav>
<ul class="nav-links" id="mainNav">

<li><a href="{{ site.baseurl }}/">首頁</a></li>
<li><a href="{{ '/about.html' | relative_url }}">關於祥安</a></li>

<li class="has-submenu">
<a href="#" class="toggle">禮儀服務</a>
<ul class="submenu">

<li class="has-submenu">
<a href="#" class="toggle">中式禮儀</a>
<ul class="submenu">
<li><a href="{{ '/services.html#chinese-customs' | relative_url }}">一般習俗</a></li>
<li><a href="{{ '/services.html#buddhist' | relative_url }}">佛教禮儀</a></li>
<li><a href="{{ '/services.html#taoist' | relative_url }}">道教禮儀</a></li>
</ul>
</li>

<li class="has-submenu">
<a href="#" class="toggle">西式禮儀</a>
<ul class="submenu">
<li><a href="{{ '/services.html#christianity' | relative_url }}">基督教</a></li>
<li><a href="{{ '/services.html#catholic' | relative_url }}">天主教</a></li>
</ul>
</li>

<li class="has-submenu">
<a href="#" class="toggle">日式禮儀</a>
<ul class="submenu">
<li><a href="{{ '/services.html#nichiren' | relative_url }}">日蓮正宗</a></li>
<li><a href="{{ '/services.html#soka' | relative_url }}">創價學會</a></li>
</ul>
</li>

<li><a href="{{ '/services.html#eco-burial' | relative_url }}">環保葬</a></li>

</ul>
</li>

<li class="has-submenu">
<a href="#" class="toggle">費用方案</a>
<ul class="submenu">
<li><a href="{{ '/plans.html#basic' | relative_url }}">6.8萬方案</a></li>
<li><a href="{{ '/plans.html#eighty-eight' | relative_url }}">8.8萬方案</a></li>
<li><a href="{{ '/plans.html#seventeen-eight' | relative_url }}">17.8萬方案</a></li>
</ul>
</li>

<li><a href="{{ '/blog.html' | relative_url }}">治喪百科</a></li>

</ul>
</nav>

<div class="menu-toggle" id="menuBtn">☰</div>

</div>
</header>


<script>
document.addEventListener("DOMContentLoaded",()=>{

const nav=document.getElementById("navbar");
const btn=document.getElementById("menuBtn");
const menu=document.getElementById("mainNav");

/* scroll effect */
window.addEventListener("scroll",()=>{
 nav.classList.toggle("scrolled",window.scrollY>50);
});

/* mobile toggle */
btn.onclick=()=>menu.classList.toggle("active");

/* accordion */
document.querySelectorAll(".toggle").forEach(link=>{
 link.onclick=e=>{
  if(window.innerWidth<1100){
   e.preventDefault();
   link.parentElement.classList.toggle("open");
  }
 };
});

});
</script>

<style>
:root{
    --deep-green:#0e160e;
    --gold:#d4b36a;
}

/* ===== NAVBAR ===== */
#navbar{
    position:fixed;
    top:0; left:0;
    width:100%;
    z-index:9999;
    background:linear-gradient(180deg,rgba(5,10,5,.55),rgba(5,10,5,.2));
    backdrop-filter:blur(16px);
    border-bottom:1px solid rgba(255,255,255,.08);
    transition:.45s;
}

#navbar.scrolled{
    background:rgba(10,18,10,.96);
    box-shadow:0 25px 70px rgba(0,0,0,.8);
}

/* ===== WRAPPER ===== */
.nav-wrapper{
    max-width:1400px;
    margin:auto;
    padding:18px 35px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* ===== LOGO ===== */
.logo img{
    height:64px;
    transition:.45s;
}
#navbar.scrolled .logo img{
    height:50px;
}

/* ===== MENU ===== */
.nav-links{
    display:flex;
    list-style:none;
    gap:45px;
}

.nav-links li{position:relative}

.nav-links a{
    color:#fff;
    text-decoration:none;
    font-size:1.05rem;
    letter-spacing:1px;
    padding:15px 0;
    display:block;
    position:relative;
    transition:.3s;
}

/* ===== 金色光暈 Hover ===== */
.nav-links a:after{
    content:"";
    position:absolute;
    bottom:0;
    left:50%;
    width:0%;
    height:2px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
    transition:.4s;
    transform:translateX(-50%);
}
.nav-links a:hover:after{
    width:100%;
}
.nav-links a:hover{
    color:var(--gold);
}

/* ===== DROPDOWN ===== */
.submenu{
    position:absolute;
    top:140%;
    left:0;
    min-width:260px;
    background:linear-gradient(145deg,#162316,#0a120a);
    border-radius:14px;
    padding:15px 0;
    opacity:0;
    visibility:hidden;
    transform:translateY(20px);
    transition:.4s;
    box-shadow:
        0 30px 70px rgba(0,0,0,.9),
        inset 0 0 40px rgba(255,255,255,.03);
}

.nav-links li:hover>.submenu{
    opacity:1;
    visibility:visible;
    transform:translateY(0);
}

.submenu li:hover>.submenu{
    left:100%;
    top:0;
    opacity:1;
    visibility:visible;
}

.submenu a{
    padding:14px 24px;
    font-size:.95rem;
}

.submenu a:hover{
    background:rgba(255,255,255,.06);
}

/* ===== MOBILE ===== */
.menu-toggle{
    display:none;
    font-size:2.2rem;
    color:var(--gold);
    cursor:pointer;
}

@media(max-width:1100px){

.menu-toggle{display:block}

/* ===== 手機側滑抽屜 ===== */
.nav-links{
    position:fixed;
    top:0;
    right:-100%;
    width:85%;
    height:100vh;
    background:rgba(10,20,10,.95);
    flex-direction:column;
    padding:140px 30px;
    transition:.5s cubic-bezier(.5,0,.2,1);
    backdrop-filter:blur(16px);
    box-shadow:-20px 0 60px rgba(0,0,0,.85);
    border-left:1px solid rgba(255,255,255,.05);
}

.nav-links.active{right:0}

.nav-links a{
    padding:20px 0;
    font-size:1.15rem;
    transition:.3s;
}

/* 手機手風琴層次卡片 */
.submenu{
    position:static;
    opacity:1;
    visibility:visible;
    transform:none;
    display:none;
    background:linear-gradient(145deg,rgba(255,255,255,.02),rgba(255,255,255,.05));
    border-radius:12px;
    margin:8px 0;
    padding-left:20px;
    box-shadow: inset 0 0 15px rgba(0,0,0,.2);
    transition:.4s ease;
}

.has-submenu.open>.submenu{
    display:block;
}

.submenu a{
    font-size:1rem;
    padding:12px 18px;
    border-radius:8px;
    transition:.3s;
}

.submenu a:hover{
    background:rgba(255,212,106,.08);
    color:var(--gold);
}
}
</style>

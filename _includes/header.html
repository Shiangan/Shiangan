<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
    --deep-green: #1a241a;
    --gold-solid: #c5a059;
    --nav-height: 80px;
    --nav-scrolled-height: 70px;
    --transition-base: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    --text-shadow-safe: 0 1px 3px rgba(0,0,0,0.6);
}

/* 基礎設定 */
body { margin: 0; padding-top: 0; }

/* 導航容器 - 修正透明時看不到字的問題 */
#navbar {
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100%;
    display: flex; 
    justify-content: center;
    height: var(--nav-height);
    z-index: 9999;
    transition: var(--transition-base);
    /* 核心修正：在頂部增加一個淡黑色的漸層，確保白字在淺色背景下也能顯現 */
    background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 100%);
}

/* 滾動後的狀態 */
#navbar.scrolled {
    height: var(--nav-scrolled-height);
    background: rgba(26, 36, 26, 0.98) !important;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(197, 160, 89, 0.3);
    box-shadow: 0 4px 30px rgba(0,0,0,0.4);
}

.nav-wrapper {
    width: 92%; 
    max-width: 1400px;
    display: flex; 
    justify-content: space-between; 
    align-items: center;
    height: 100%;
}

/* Logo 縮放動畫 */
.logo a { display: flex; align-items: center; text-decoration: none; }
.logo img { 
    height: 60px; 
    width: auto; 
    transition: var(--transition-base); 
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
}
#navbar.scrolled .logo img { height: 48px; }

/* 桌面選單列表 */
.nav-links {
    display: flex; 
    list-style: none; 
    gap: 25px;
    margin: 0; 
    padding: 0; 
    align-items: center;
}
.nav-links > li { position: relative; display: flex; align-items: center; }
.nav-links > li > a {
    font-family: "Noto Serif TC", "Noto Sans TC", serif;
    color: #ffffff; 
    text-decoration: none; 
    font-size: 1.05rem;
    font-weight: 500; 
    letter-spacing: 1.2px; 
    padding: 10px 0;
    transition: all 0.3s;
    /* 核心修正：增加文字陰影，防背景過白 */
    text-shadow: var(--text-shadow-safe);
}

/* 滾動後移除陰影讓視覺更乾淨 */
#navbar.scrolled .nav-links > li > a {
    text-shadow: none;
}

.nav-links > li > a:hover { 
    color: var(--gold-solid); 
    cursor: pointer; 
}

/* 下拉選單樣式 */
.submenu {
    position: absolute; 
    top: 100%; 
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: #1e2b1e; 
    list-style: none; 
    padding: 10px 0;
    min-width: 220px; 
    opacity: 0; 
    visibility: hidden;
    transition: var(--transition-base);
    border-top: 3px solid var(--gold-solid);
    box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    z-index: 999;
}

/* 桌面版選單展開邏輯 */
@media (min-width: 1101px) {
    .nav-links li:hover > .submenu { 
        opacity: 1; 
        visibility: visible; 
        transform: translateX(-50%) translateY(0);
    }
}

.submenu li a {
    color: rgba(255,255,255,0.95); 
    text-decoration: none;
    padding: 12px 25px; 
    display: block; 
    font-size: 0.95rem;
    transition: all 0.3s; 
    border-bottom: 1px solid rgba(255,255,255,0.05);
    text-shadow: none; /* 下拉選單有底色，不需陰影 */
}

.submenu li a:hover { 
    color: #ffffff; 
    background: rgba(197, 160, 89, 0.15); 
    padding-left: 30px; 
}

/* 箭頭旋轉 */
.menu-item i { 
    transition: transform 0.3s ease; 
    margin-left: 6px; 
    font-size: 0.75rem; 
    opacity: 0.8;
}
.has-submenu:hover > .menu-item i { transform: rotate(180deg); color: var(--gold-solid); }

/* 花禮訂購按鈕樣式優化 */
.nav-cta-btn {
    color: #ffffff !important;
    background: rgba(197, 160, 89, 0.2);
    font-weight: 600 !important;
    border: 1.5px solid var(--gold-solid) !important;
    padding: 8px 22px !important;
    border-radius: 50px; /* 圓角更現代 */
    transition: all 0.3s ease !important;
    text-shadow: none !important;
}
.nav-cta-btn:hover {
    background-color: var(--gold-solid) !important;
    color: #1a241a !important;
    box-shadow: 0 4px 15px rgba(197, 160, 89, 0.4);
}

/* 手機版開關按鈕 */
.menu-toggle {
    display: none; 
    font-size: 1.8rem; 
    color: var(--gold-solid);
    cursor: pointer; 
    z-index: 10001;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
}

/* 手機響應式樣式 */
@media (max-width: 1100px) {
    .menu-toggle { display: block; }
    
    #navbar { background: rgba(0,0,0,0.2); } /* 手機版頂部稍微壓暗 */

    .nav-links {
        position: fixed; 
        top: 0; 
        right: -100%; 
        width: 85%; 
        height: 100vh;
        flex-direction: column; 
        padding: 100px 40px; 
        gap: 0;
        background: var(--deep-green); 
        overflow-y: auto; 
        transition: right 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 9999; 
        align-items: flex-start;
        box-shadow: -10px 0 30px rgba(0,0,0,0.5);
    }
    .nav-links.active { right: 0; }

    .nav-links > li { width: 100%; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .nav-links > li > a { 
        display: flex; 
        justify-content: space-between; 
        padding: 18px 0; 
        font-size: 1.1rem;
        text-shadow: none;
    }

    .submenu { 
        position: static !important; 
        opacity: 1 !important; 
        visibility: visible !important; 
        display: none; 
        width: 100%; 
        background: rgba(0,0,0,0.2); 
        border: none; 
        box-shadow: none; 
        padding: 0;
        transform: none !important;
    }
    .nav-links li.show-submenu > .submenu { display: block; }
    
    .submenu li a { padding: 15px 25px; background: transparent; }

    .nav-cta-btn { 
        margin-top: 30px; 
        display: block; 
        width: 100%; 
        text-align: center;
        border-radius: 8px;
    }
}

/* 手機版背景遮罩 */
.nav-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); opacity: 0; visibility: hidden;
    transition: 0.4s; z-index: 9998;
    backdrop-filter: blur(4px);
}
.nav-overlay.active { opacity: 1; visibility: visible; }
</style>

<header id="navbar">
    <div class="nav-wrapper">
        <div class="logo">
            <a href="{{ site.baseurl }}/">
                <img src="{{ 'images/logo.png' | relative_url }}" alt="祥安生命">
            </a>
        </div>

        <nav>
            <ul class="nav-links" id="main-nav">
                <li><a href="{{ '/' | relative_url }}">首頁</a></li>
                <li><a href="{{ '/about.html' | relative_url }}">關於祥安</a></li>

                <li class="has-submenu">
                    <a href="javascript:void(0)" class="menu-item">生命禮儀服務 <i class="fas fa-chevron-down"></i></a>
                    <ul class="submenu">
                        <li><a href="{{ '/chinese-ritual/' | relative_url }}">中式禮儀服務</a></li>
                        <li><a href="{{ '/western-ritual/' | relative_url }}">西式禮儀服務</a></li>
                        <li><a href="{{ '/japanese-ritual/' | relative_url }}">日式禮儀服務</a></li>
                    </ul>
                </li>

                <li class="has-submenu">
                    <a href="javascript:void(0)" class="menu-item">服務契約方案 <i class="fas fa-chevron-down"></i></a>
                    <ul class="submenu">
                        <li><a href="{{ '/compare.html' | relative_url }}" style="color: var(--gold-solid); font-weight: bold;">➔ 方案規格對照</a></li>
                        <li><a href="{{ '/deed01.html' | relative_url }}">國民專案 6.8萬</a></li>
                        <li><a href="{{ '/deed02.html' | relative_url }}">中式精緻 8.8萬</a></li>
                        <li><a href="{{ '/deed03.html' | relative_url }}">中式尊榮 11.8萬</a></li>

                        <li><a href="{{ '/market-compare.html' | relative_url }}">契約比較表</a></li>
                    </ul>
                </li>
                
                <li><a href="{{ '/complaint-policy.html' | relative_url }}">消費權益保障</a></li>
                <li><a href="{{ '/eco-burial.html' | relative_url }}">環保葬專區</a></li>
                <li><a href="{{ '/blog.html' | relative_url }}">治喪百科</a></li>
                <li><a href="{{ '/order.html' | relative_url }}" class="nav-cta-btn">花禮訂購</a></li>
            </ul>
        </nav>

        <div class="menu-toggle" id="menu-btn"><i class="fas fa-bars"></i></div>
    </div>
</header>

<div class="nav-overlay" id="nav-overlay"></div>

<script>
document.addEventListener('DOMContentLoaded', function(){
    const navbar = document.getElementById('navbar');
    const menuBtn = document.getElementById('menu-btn');
    const navLinks = document.getElementById('main-nav');
    const overlay = document.getElementById('nav-overlay');
    const hasSubmenus = document.querySelectorAll('.has-submenu');

    // 滾動效果 (優化效能，防止頻繁重繪)
    let isScrolled = false;
    window.addEventListener('scroll', () => {
        if (window.scrollY > 40) {
            if (!isScrolled) {
                navbar.classList.add('scrolled');
                isScrolled = true;
            }
        } else {
            if (isScrolled) {
                navbar.classList.remove('scrolled');
                isScrolled = false;
            }
        }
    });

    // 手機開關邏輯
    function toggleMobileMenu() {
        navLinks.classList.toggle('active');
        overlay.classList.toggle('active');
        const icon = menuBtn.querySelector('i');
        icon.classList.toggle('fa-bars');
        icon.classList.toggle('fa-times');
        
        if(!navLinks.classList.contains('active')) {
            hasSubmenus.forEach(item => item.classList.remove('show-submenu'));
        }
    }

    menuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleMobileMenu();
    });

    overlay.addEventListener('click', toggleMobileMenu);

    // 手機版子選單展開 (Accordion 模式)
    hasSubmenus.forEach(item => {
        const link = item.querySelector('.menu-item');
        link.addEventListener('click', (e) => {
            if (window.innerWidth <= 1100) {
                e.preventDefault();
                e.stopPropagation();
                
                const isOpen = item.classList.contains('show-submenu');
                hasSubmenus.forEach(el => el.classList.remove('show-submenu'));
                
                if (!isOpen) {
                    item.classList.add('show-submenu');
                }
            }
        });
    });

    navLinks.addEventListener('click', (e) => {
        if (e.target.tagName === 'A' && !e.target.classList.contains('menu-item')) {
            if (window.innerWidth <= 1100) toggleMobileMenu();
        }
        e.stopPropagation();
    });
});
</script>

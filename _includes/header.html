<style>
:root {
    --deep-green: #1a241a;
    --gold-solid: #c5a059;
    --nav-height: 80px;
    --nav-scrolled-height: 65px;
}

/* 導航容器 */
#navbar {
    position: fixed; top:0; left:0; width:100%;
    display:flex; justify-content:center;
    height: var(--nav-height);
    z-index:9999;
    transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
    background: transparent;
}
#navbar.scrolled {
    height: var(--nav-scrolled-height);
    background: rgba(26,36,26,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(197,160,89,0.3);
    box-shadow:0 4px 20px rgba(0,0,0,0.3);
}

.nav-wrapper {
    width:92%; max-width:1400px;
    display:flex; justify-content:space-between; align-items:center;
}

/* Logo */
.logo a { display:flex; align-items:center; }
.logo img { height:60px; width:auto; transition:0.3s ease; }
#navbar.scrolled .logo img { height:45px; }

/* 桌面選單 */
.nav-links {
    display:flex; list-style:none; gap:35px;
    margin:0; padding:0; align-items:center;
}
.nav-links > li { position:relative; display:flex; align-items:center; }
.nav-links > li > a {
    font-family: "Noto Serif TC", "Noto Sans TC", serif;
    color:white; text-decoration:none; font-size:1.05rem;
    font-weight:500; letter-spacing:1.5px; padding:10px 0;
    transition: color 0.3s;
}
.nav-links > li > a:hover { color: var(--gold-solid); cursor:pointer; }

/* 下拉選單 */
.submenu {
    position:absolute; top:100%; left:0;
    background:#1e2b1e; list-style:none; padding:10px 0;
    min-width:220px; opacity:0; visibility:hidden;
    transition: all 0.3s ease;
    border:1px solid var(--gold-solid);
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    z-index: 999;
}

/* 桌面 hover 顯示下拉 */
@media (min-width:1101px){
    .nav-links li:hover > .submenu { opacity:1; visibility:visible; top:100%; }
    .submenu li:hover > .submenu { opacity:1; visibility:visible; top:0; left:100%; }
}

/* 子選單文字 */
.submenu li { position:relative; }
.submenu li a {
    color: rgba(255,255,255,0.9); text-decoration:none;
    padding:10px 20px; display:block; font-size:0.95rem;
    transition: all 0.3s;
}
.submenu li a:hover { color: var(--gold-solid); background: rgba(255,255,255,0.05); padding-left:25px; }

/* 箭頭旋轉動畫 */
.menu-item i {
    transition: transform 0.3s ease;
}
.show-submenu > .menu-item i {
    transform: rotate(180deg);
}

/* 手機版三槓 */
.menu-toggle {
    display:none; font-size:1.8rem; color: var(--gold-solid);
    cursor:pointer; z-index:10001;
}

/* 手機響應式 */
@media(max-width:1100px){
    .menu-toggle{ display:block; }
    .nav-links {
        position: fixed; top:0; right:-100%; width:80%; height:100vh;
        flex-direction:column; padding:120px 30px; gap:10px; align-items:flex-start;
        background: var(--deep-green); overflow-y:auto; transition:right 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    .nav-links.active { right:0; }

    /* 手機全部下拉改為點擊展開 */
    .submenu { 
        position: static !important; opacity:1 !important; visibility:visible !important; 
        display:none; width:100%; background: rgba(0,0,0,0.1); border:none; box-shadow:none; padding:0; margin:0;
    }
    .nav-links li.show-submenu > .submenu { display:block; }

    /* 多層縮排 */
    .submenu li > .submenu { padding-left:15px; }
    .submenu li > .submenu li > .submenu { padding-left:25px; }

    /* 箭頭旋轉 */
    .menu-item i { transition: transform 0.3s; }
    .show-submenu > .menu-item i { transform: rotate(180deg); }
}
</style>

<header id="navbar">
<div class="nav-wrapper">
    <div class="logo">
        <a href="{{ site.baseurl }}/">
            <img src="{{ 'images/logo.png' | relative_url }}" alt="祥安生命">
        </a>
    </div>

  <nav>
    <ul class="nav-links" id="main-nav">
        <li><a href="{{ '/' | relative_url }}">首頁</a></li>
        <li><a href="{{ '/about.html' | relative_url }}">關於祥安</a></li>

        <li class="has-submenu">
            <a href="javascript:void(0)" class="menu-item">生命禮儀服務 <i class="fas fa-chevron-down"></i></a>
            <ul class="submenu">
                <li><a href="{{ '/chinese-ritual/' | relative_url }}">中式禮儀服務</a></li>
                
                <li><a href="{{ '/western-ritual/' | relative_url }}">西式禮儀服務</a></li>

                <li><a href="{{ '/japanese-ritual/' | relative_url }}">日式禮儀服務</a></li>
                
            </ul>
        </li>

        <li class="has-submenu">
    <a href="javascript:void(0)" class="menu-item">服務契約 <i class="fas fa-chevron-down"></i></a>
    <ul class="submenu">
        <li><a href="{{ '/deed01.html' | relative_url }}">國民契約 6.8萬</a></li>
        
        <li><a href="{{ '/deed02.html' | relative_url }}">中式契約 8.8萬</a></li>
        
        <li><a href="{{ '/plans.html#seventeen-eight' | relative_url }}">中式契約 17.8萬</a></li>
        
        <li><a href="{{ '/compare.html' | relative_url }}">契約比較表</a></li>
    </ul>
</li>


        <li><a href="{{ '/services.html#eco-burial' | relative_url }}">環保葬專區</a></li>

        <li><a href="{{ '/blog.html' | relative_url }}">治喪百科</a></li>
        <li><a href="{{ '/order.html' | relative_url }}" style="color: var(--gold-solid); font-weight:bold; border:1px solid var(--gold-solid); padding:8px 15px; border-radius:4px;">花禮訂購</a></li>
    </ul>
</nav>


    <div class="menu-toggle" id="menu-btn"><i class="fas fa-bars"></i></div>
</div>
</header>

<script>
document.addEventListener('DOMContentLoaded', function(){
    const navbar = document.getElementById('navbar');
    const menuBtn = document.getElementById('menu-btn');
    const navLinks = document.getElementById('main-nav');
    const hasSubmenus = document.querySelectorAll('.has-submenu');

    // 滾動縮小
    window.addEventListener('scroll', ()=> {
        if(window.scrollY>50) navbar.classList.add('scrolled');
        else navbar.classList.remove('scrolled');
    });

    // 手機開關
    menuBtn.addEventListener('click', e=>{
        e.stopPropagation();
        navLinks.classList.toggle('active');
        const icon = menuBtn.querySelector('i');
        icon.classList.toggle('fa-bars');
        icon.classList.toggle('fa-times');
    });

    // 手機點擊展開子選單
    hasSubmenus.forEach(item=>{
        const link = item.querySelector('.menu-item');
        if(link){
            link.addEventListener('click', e=>{
                if(window.innerWidth <=1100){
                    e.preventDefault(); e.stopPropagation();
                    const parent = item.parentElement;
                    Array.from(parent.children).forEach(sib=>{
                        if(sib!==item) sib.classList.remove('show-submenu');
                    });
                    item.classList.toggle('show-submenu');
                }
            });
        }
    });

    // 點擊空白收合手機選單
    document.addEventListener('click', ()=>{
        navLinks.classList.remove('active');
        menuBtn.querySelector('i').className='fas fa-bars';
        hasSubmenus.forEach(item=>item.classList.remove('show-submenu'));
    });
});
</script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
    --deep-green: #1a241a;
    --gold-solid: #c5a059;
    --nav-height: 80px;
    --nav-scrolled-height: 65px;
    --transition-base: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

/* 基礎設定 */
body { margin: 0; }

/* 導航容器 */
#navbar {
    position: fixed; top: 0; left: 0; width: 100%;
    display: flex; justify-content: center;
    height: var(--nav-height);
    z-index: 9999;
    transition: var(--transition-base);
    /* 關鍵設定：預設就帶有極淡的深色磨砂感，確保白字永遠清晰 */
    background: linear-gradient(to bottom, 
        rgba(26, 36, 26, 0.8) 0%, 
        rgba(26, 36, 26, 0.4) 50%, 
        transparent 100%);
    backdrop-filter: blur(8px); /* 磨砂玻璃核心：背景模糊 */
    -webkit-backdrop-filter: blur(8px);
}


#navbar.scrolled {
    height: var(--nav-scrolled-height);
    background: rgba(26, 36, 26, 0.95);
    backdrop-filter: blur(15px);
    border-bottom: 1px solid rgba(197, 160, 89, 0.2);
    box-shadow: 0 4px 30px rgba(0,0,0,0.3);
}

.nav-wrapper {
    width: 92%; max-width: 1400px;
    display: flex; justify-content: space-between; align-items: center;
    height: 100%;
}

/* Logo */
.logo a { display: flex; align-items: center; text-decoration: none; }
.logo img { height: 60px; width: auto; transition: 0.3s ease; }
#navbar.scrolled .logo img { height: 45px; }

/* 桌面選單列表 */
.nav-links {
    display: flex; list-style: none; gap: 30px;
    margin: 0; padding: 0; align-items: center;
}
.nav-links > li { position: relative; display: flex; align-items: center; }
.nav-links > li > a {
    font-family: "Noto Serif TC", "Noto Sans TC", serif;
    color: white; text-decoration: none; font-size: 1.05rem;
    font-weight: 500; letter-spacing: 1.5px; padding: 10px 0;
    transition: color 0.3s;
}
.nav-links > li > a:hover { color: var(--gold-solid); cursor: pointer; }

/* 下拉選單基礎 */
.submenu {
    position: absolute; top: 100%; left: 0;
    background: #1e2b1e; list-style: none; padding: 10px 0;
    min-width: 220px; opacity: 0; visibility: hidden;
    transition: var(--transition-base);
    border-top: 2px solid var(--gold-solid);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    z-index: 999;
}

/* 桌面 Hover 邏輯 */
@media (min-width: 1101px) {
    .nav-links li:hover > .submenu { opacity: 1; visibility: visible; }
    .submenu li:hover > .submenu { top: 0; left: 100%; }
}

.submenu li a {
    color: rgba(255,255,255,0.9); text-decoration: none;
    padding: 12px 20px; display: block; font-size: 0.95rem;
    transition: all 0.3s; border-bottom: 1px solid rgba(255,255,255,0.05);
}
.submenu li a:hover { color: var(--gold-solid); background: rgba(255,255,255,0.05); padding-left: 25px; }

/* 箭頭旋轉 */
.menu-item i { transition: transform 0.3s ease; margin-left: 5px; font-size: 0.8rem; }
.show-submenu > .menu-item i { transform: rotate(180deg); }

/* 花禮訂購按鈕樣式優化 */
.nav-cta-btn {
    color: var(--gold-solid) !important;
    font-weight: bold !important;
    border: 1px solid var(--gold-solid) !important;
    padding: 8px 18px !important;
    border-radius: 4px;
    transition: all 0.3s ease !important;
}
.nav-cta-btn:hover {
    background-color: var(--gold-solid) !important;
    color: #fff !important;
}

/* 手機版開關按鈕 */
.menu-toggle {
    display: none; font-size: 1.8rem; color: var(--gold-solid);
    cursor: pointer; z-index: 10001;
}

/* 手機版背景遮罩 */
.nav-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6); opacity: 0; visibility: hidden;
    transition: 0.3s; z-index: 9998;
}
.nav-overlay.active { opacity: 1; visibility: visible; }

/* 手機響應式樣式 */
@media (max-width: 1100px) {
    .menu-toggle { display: block; }
    
    .nav-links {
        position: fixed; top: 0; right: -100%; width: 80%; height: 100vh;
        flex-direction: column; padding: 100px 30px 50px; gap: 5px;
        background: var(--deep-green); overflow-y: auto; 
        transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 9999; align-items: flex-start;
    }
    .nav-links.active { right: 0; }

    .nav-links > li { width: 100%; display: block; }
    .nav-links > li > a { 
        display: flex; justify-content: space-between; 
        padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1); 
    }

    /* 手機版下拉選單改為垂直展開 */
    .submenu { 
        position: static !important; opacity: 1 !important; visibility: visible !important; 
        display: none; width: 100%; background: rgba(0,0,0,0.15); 
        border: none; box-shadow: none; padding: 0;
    }
    .nav-links li.show-submenu > .submenu { display: block; }
    
    .submenu li a { padding: 15px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); }

    .nav-cta-btn { margin-top: 20px; display: inline-block; width: 100%; text-align: center; }
}
</style>

        <nav>

                <li class="has-submenu">

                        <li><a href="{{ '/compare.html' | relative_url }}" style="color: var(--gold-solid); font-weight: bold;">➔ 方案規格對照</a></li>

        </nav>

        <div class="menu-toggle" id="menu-btn"><i class="fas fa-bars"></i></div>
    </div>
</header>

<div class="nav-overlay" id="nav-overlay"></div>

<script>
document.addEventListener('DOMContentLoaded', function(){
    const navbar = document.getElementById('navbar');
    const menuBtn = document.getElementById('menu-btn');
    const navLinks = document.getElementById('main-nav');
    const overlay = document.getElementById('nav-overlay');
    const hasSubmenus = document.querySelectorAll('.has-submenu');

    // 滾動效果 (優化效能)
    let lastScroll = 0;
    window.addEventListener('scroll', () => {
        const currentScroll = window.scrollY;
        if (currentScroll > 50) {
            navbar.classList.add('scrolled');
        } else {
            navbar.classList.remove('scrolled');
        }
    });

    // 手機開關邏輯
    function toggleMobileMenu() {
        navLinks.classList.toggle('active');
        overlay.classList.toggle('active');
        const icon = menuBtn.querySelector('i');
        icon.classList.toggle('fa-bars');
        icon.classList.toggle('fa-times');
        
        // 如果關閉主選單，順便把已打開的子選單也關掉
        if(!navLinks.classList.contains('active')) {
            hasSubmenus.forEach(item => item.classList.remove('show-submenu'));
        }
    }

    menuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleMobileMenu();
    });

    // 點擊遮罩關閉選單
    overlay.addEventListener('click', toggleMobileMenu);

    // 手機版子選單展開
    hasSubmenus.forEach(item => {
        const link = item.querySelector('.menu-item');
        link.addEventListener('click', (e) => {
            if (window.innerWidth <= 1100) {
                e.preventDefault();
                e.stopPropagation();
                
                // 取得目前狀態
                const isOpen = item.classList.contains('show-submenu');
                
                // 關閉同層級其他打開的子選單 (Accordion 效果)
                hasSubmenus.forEach(el => el.classList.remove('show-submenu'));
                
                // 如果原本是關的，就打開
                if (!isOpen) {
                    item.classList.add('show-submenu');
                }
            }
        });
    });

    // 防止選單內點擊導致選單關閉 (除了點擊真正的連結)
    navLinks.addEventListener('click', (e) => {
        e.stopPropagation();
    });
});
</script>

<style>
    /* --- 核心層級與顯示修復 --- */
    :root {
        --deep-green: #1a241a;
        --gold-solid: #c5a059;
    }

    #navbar {
        position: fixed;
        top: 0; left: 0; width: 100%;
        display: flex; justify-content: center;
        padding: 25px 0;
        z-index: 9999 !important; /* 強制最高層級，防止被內容遮擋 */
        transition: all 0.5s ease;
        background: transparent;
    }

    #navbar.scrolled {
        padding: 12px 0;
        background: rgba(26, 36, 26, 0.95);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(197, 160, 89, 0.3);
    }

    .nav-wrapper {
        width: 90%;
        max-width: 1300px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: relative;
    }

    .logo img { height: 55px; filter: brightness(0) invert(1); transition: 0.3s; }
    #navbar.scrolled .logo img { height: 45px; }

    /* 桌機選單列 */
    .nav-links {
        display: flex;
        list-style: none;
        gap: 30px;
        margin: 0; padding: 0;
    }

    .nav-links > li { position: relative; }

    .nav-links > li > a {
        color: white;
        text-decoration: none;
        font-size: 0.95rem;
        letter-spacing: 1px;
        padding: 10px 0;
        display: block;
    }

    /* 下拉選單顯示修復 */
    .submenu {
        position: absolute;
        top: 100%; left: 50%;
        transform: translateX(-50%) translateY(15px);
        background: #1e2b1e;
        width: 240px;
        padding: 15px 0;
        list-style: none;
        border: 1px solid rgba(197, 160, 89, 0.4);
        opacity: 0;
        visibility: hidden;
        transition: 0.3s ease;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .nav-links li:hover .submenu {
        opacity: 1;
        visibility: visible;
        transform: translateX(-50%) translateY(0);
    }

    .submenu li a {
        color: rgba(255,255,255,0.8);
        text-decoration: none;
        padding: 10px 25px;
        display: block;
        font-size: 0.9rem;
    }

    .submenu li a:hover { color: var(--gold-solid); background: rgba(255,255,255,0.05); }

    /* 手機版按鈕顯示強制修復 */
    .menu-toggle {
        display: none;
        color: var(--gold-solid);
        font-size: 1.8rem;
        cursor: pointer;
        padding: 5px;
    }

    @media (max-width: 1100px) {
        .menu-toggle { display: block !important; } /* 強制顯示漢堡 */
        
        .nav-links {
            position: fixed;
            top: 0; right: -100%; /* 初始隱藏 */
            width: 80%; height: 100vh;
            background: #1a241a;
            flex-direction: column;
            padding: 100px 40px;
            transition: 0.4s ease-in-out;
            z-index: 10000;
            display: flex; /* 確保內容有顯示出來 */
        }

        .nav-links.active { right: 0; }

        .submenu { 
            position: static; transform: none !important; 
            opacity: 1; visibility: visible; 
            width: 100%; background: rgba(0,0,0,0.3);
            display: none; /* 手機版點擊後才顯示內容 */
            box-shadow: none; border: none;
        }

        .nav-links li.show-submenu .submenu {
            display: block;
        }
    }
</style>

<header id="navbar">
    <div class="nav-wrapper">
        <div class="logo">
            <a href="{{ site.baseurl }}/index.html"><img src="{{ site.baseurl }}/images/logo.png" alt="祥安生命"></a>
        </div>
        
        <nav>
            <ul class="nav-links">
                <li><a href="{{ site.baseurl }}/index.html">首頁</a></li>
                <li><a href="{{ site.baseurl }}/about.html">關於祥安</a></li>
                <li class="has-submenu">
                    <a href="javascript:void(0)">專業生命禮儀 <i class="fas fa-chevron-down"></i></a>
                    <ul class="submenu">
                        <li><a href="{{ site.baseurl }}/services.html#buddhist-taoist">中式禮儀 (佛/道教)</a></li>
                        <li><a href="{{ site.baseurl }}/services.html#western-etiquette">西式禮儀 (基/天主教)</a></li>
                        <li><a href="{{ site.baseurl }}/services.html#japanese-etiquette">日式禮儀 (日蓮正宗)</a></li>
                        <li><a href="{{ site.baseurl }}/services.html#eco-burial">環保葬 (樹/花/海葬)</a></li>
                    </ul>
                </li>
                <li class="has-submenu">
                    <a href="javascript:void(0)">喪葬費用方案 <i class="fas fa-chevron-down"></i></a>
                    <ul class="submenu">
                        <li><a href="{{ site.baseurl }}/plans.html#basic">國民契約 6.8萬</a></li>
                        <li><a href="{{ site.baseurl }}/plans.html#eighty-eight">中式契約 8.8萬起</a></li>
                        <li><a href="{{ site.baseurl }}/plans.html#seventeen-eight">尊榮契約 17.8萬</a></li>
                    </ul>
                </li>
                <li><a href="{{ site.baseurl }}/blog.html">殯葬百科</a></li>
                <li><a href="{{ site.baseurl }}/order.html" style="color: var(--gold-solid); font-weight: bold;">花禮訂購</a></li>
            </ul>
        </nav>
        <div class="menu-toggle"><i class="fas fa-bars"></i></div>
    </div>
</header>

<script>
    // 獨立作用域，防止 JS 衝突
    (function() {
        document.addEventListener('DOMContentLoaded', function() {
            const navbar = document.getElementById('navbar');
            const menuBtn = document.querySelector('.menu-toggle');
            const navLinks = document.querySelector('.nav-links');
            const submenus = document.querySelectorAll('.has-submenu');

            // 1. 捲動變色
            window.addEventListener('scroll', function() {
                if (window.scrollY > 30) { navbar.classList.add('scrolled'); }
                else { navbar.classList.remove('scrolled'); }
            });

            // 2. 漢堡選單開關
            if (menuBtn) {
                menuBtn.onclick = function(e) {
                    e.stopPropagation();
                    navLinks.classList.toggle('active');
                    this.querySelector('i').classList.toggle('fa-bars');
                    this.querySelector('i').classList.toggle('fa-times');
                };
            }

            // 3. 手機版下拉選單顯示邏輯
            submenus.forEach(item => {
                item.onclick = function(e) {
                    if (window.innerWidth <= 1100) {
                        e.stopPropagation();
                        this.classList.toggle('show-submenu');
                    }
                };
            });

            // 4. 點擊外部關閉選單
            document.onclick = function() {
                navLinks.classList.remove('active');
                if (menuBtn) {
                    menuBtn.querySelector('i').className = 'fas fa-bars';
                }
            };
        });
    })();
</script>

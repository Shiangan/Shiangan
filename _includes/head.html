<style>
    :root {
        --bg-master: #f2efeb;      /* 全站羊絨灰 */
        --accent: #a88e6a;         /* 職人金 */
        --deep-ink: #1e1e1e;       /* 石墨黑 */
        --text-main: #3d3d3d;      /* 炭灰 */
        --line-soft: rgba(168, 142, 106, 0.15);
        --side-gap: clamp(1.2rem, 6vw, 10rem); 
        --section-gap: clamp(50px, 8vh, 100px);
        --transition-prime: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; letter-spacing: 0.05em; }
    html, body { overflow-x: hidden; width: 100%; position: relative; scroll-behavior: smooth; }
    body {
        font-family: 'Noto Sans TC', sans-serif;
        background-color: var(--bg-master);
        color: var(--text-main);
        margin: 0; line-height: 1.8;
    }

    main { padding-top: 90px; }
    @media (max-width: 1100px) { main { padding-top: 80px; } }

    /* 首頁組件樣式 */
    .hero {
        height: 80vh; min-height: 600px; display: flex; align-items: center;
        padding: 0 var(--side-gap); position: relative; overflow: hidden;
    }
    .hero-bg {
        position: absolute; right: 0; top: 0; width: 85%; height: 100%;
        background: url('https://images.unsplash.com/photo-1494194123974-02393a002811?auto=format&fit=crop&q=80') center/cover;
        mask-image: linear-gradient(to left, black 50%, transparent 100%);
        -webkit-mask-image: linear-gradient(to left, black 50%, transparent 100%);
        z-index: 1; opacity: 0.95;
    }
    @media (max-width: 768px) { .hero-bg { width: 100%; opacity: 0.2; mask-image: none; } }
    
    .hero-content { position: relative; z-index: 10; max-width: 800px; }
    .hero h1 { font-family: 'Noto Serif TC', serif; font-size: clamp(2.5rem, 6vw, 4.5rem); line-height: 1.2; margin-bottom: 25px; color: var(--deep-ink); font-weight: 900; }

    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 40px var(--side-gap); background: rgba(255,255,255,0.3); border-top: 1px solid var(--line-soft); }
    @media (min-width: 1024px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
    .stat-box { text-align: center; border-left: 2px solid var(--accent); padding: 10px 0; }
    .stat-val { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--accent); font-style: italic; display: block; }
    .stat-lab { font-size: 0.8rem; letter-spacing: 2px; font-weight: 700; opacity: 0.7; }

    .section { padding: var(--section-gap) 0; position: relative; }
    .wrapper { max-width: 1400px; margin: 0 auto; padding: 0 var(--side-gap); }

    /* FAQ 與 動畫樣式 */
    .faq-item { border-bottom: 1px solid var(--line-soft); padding: 5px 0; }
    .faq-toggle { width: 100%; padding: 25px 0; display: flex; justify-content: space-between; align-items: center; background: none; border: none; cursor: pointer; text-align: left; outline: none; }
    .faq-toggle h4 { font-size: 1.15rem; color: var(--deep-ink); margin: 0; flex: 1; font-family: 'Noto Sans TC', sans-serif; }
    .faq-icon { color: var(--accent); transition: transform 0.4s; font-size: 1.5rem; margin-left: 20px; display: flex; align-items: center; justify-content: center; width: 30px; }
    .faq-content { max-height: 0; overflow: hidden; transition: max-height 0.5s ease, padding 0.3s ease; color: #555; font-size: 1rem; line-height: 1.8; }
    .faq-item.active .faq-content { max-height: 1000px; padding-bottom: 30px; }
    .faq-item.active .faq-icon { transform: rotate(45deg); color: var(--deep-ink); }

    .reveal { opacity: 0; transform: translateY(30px); transition: 1s var(--transition-prime); }
    .reveal.revealed { opacity: 1; transform: translateY(0); }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // FAQ 手風琴邏輯
        const faqItems = document.querySelectorAll('.faq-item');
        faqItems.forEach(item => {
            const btn = item.querySelector('.faq-toggle');
            if (btn) {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const isActive = item.classList.contains('active');
                    faqItems.forEach(i => i.classList.remove('active'));
                    if (!isActive) item.classList.add('active');
                });
            }
        });

        // 捲動揭幕動畫
        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('revealed');
                    revealObserver.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });

        document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
    });
</script>

<style>
    /* --- 1. 全站基礎修正：解決跑版與捲動鎖死 --- */
    :root {
        --bg-master: #f2efeb;      /* 全站羊絨灰 */
        --accent: #a88e6a;         /* 職人金 */
        --deep-ink: #1e1e1e;       /* 石墨黑 */
        --text-main: #3d3d3d;      /* 炭灰 */
        --line-soft: rgba(168, 142, 106, 0.15);
        --side-gap: clamp(1.25rem, 6vw, 10rem); 
        --section-gap: clamp(50px, 8vh, 100px);
        --transition-prime: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; letter-spacing: 0.05em; }

    /* 關鍵：徹底解鎖垂直捲動並防止左右溢出 */
    html {
        margin: 0; padding: 0;
        width: 100%; height: auto;
        overflow-x: hidden;
        overflow-y: auto;
        -webkit-text-size-adjust: 100%;
    }

    body {
        margin: 0; padding: 0;
        width: 100%; min-height: 100vh;
        background-color: var(--bg-master);
        color: var(--text-main);
        font-family: 'Noto Sans TC', sans-serif;
        line-height: 1.8;
        position: relative;
        overflow-x: hidden;
    }

    /* 確保內容不被固定導覽列遮住 */
    main { 
        padding-top: 100px; 
        display: block;
        width: 100%; 
    }
    @media (max-width: 1100px) { main { padding-top: 80px; } }

    .wrapper { 
        max-width: 1400px; 
        margin: 0 auto; 
        padding: 0 var(--side-gap); 
        width: 100%;
    }

    /* --- 2. 視覺組件：浮水印與 Hero --- */
    .watermark {
        position: absolute; font-family: 'Playfair Display', serif; 
        font-style: italic; font-size: clamp(5rem, 15vw, 15rem); 
        color: rgba(168, 142, 106, 0.04);
        white-space: nowrap; pointer-events: none; z-index: 0;
        user-select: none;
    }

    .hero {
        height: 75vh; min-height: 500px; display: flex; align-items: center;
        padding: 0 var(--side-gap); position: relative; overflow: hidden;
        width: 100%;
    }
    .hero-bg {
        position: absolute; right: 0; top: 0; width: 100%; height: 100%;
        background: url('https://images.unsplash.com/photo-1494194123974-02393a002811?auto=format&fit=crop&q=80') center/cover no-repeat;
        z-index: 1; opacity: 0.2;
    }
    @media (min-width: 992px) {
        .hero-bg {
            width: 85%; opacity: 0.95;
            -webkit-mask-image: linear-gradient(to left, black 60%, transparent 100%);
            mask-image: linear-gradient(to left, black 60%, transparent 100%);
        }
    }
    
    .hero-content { position: relative; z-index: 10; max-width: 800px; }
    .hero h1 { font-family: 'Noto Serif TC', serif; font-size: clamp(2.2rem, 6vw, 4.5rem); line-height: 1.2; color: var(--deep-ink); font-weight: 900; margin-bottom: 25px; }

    /* --- 3. 數據與列表樣式 --- */
    .stats-grid { 
        display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; 
        padding: 40px var(--side-gap); background: rgba(255,255,255,0.3); 
        border-top: 1px solid var(--line-soft); width: 100%;
    }
    @media (min-width: 1024px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
    .stat-box { text-align: center; border-left: 2px solid var(--accent); padding: 10px 0; }
    .stat-val { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--accent); font-style: italic; display: block; }

    /* --- 4. 互動元件：FAQ --- */
    .faq-list { max-width: 900px; margin: 0 auto; }
    .faq-item { border-bottom: 1px solid var(--line-soft); padding: 5px 0; }
    .faq-toggle { 
        width: 100%; padding: 25px 0; display: flex; justify-content: space-between; align-items: center; 
        background: none; border: none; cursor: pointer; text-align: left; outline: none;
    }
    .faq-toggle h4 { font-size: 1.15rem; color: var(--deep-ink); margin: 0; flex: 1; font-family: 'Noto Sans TC', sans-serif; }
    .faq-icon { color: var(--accent); transition: transform 0.4s; font-size: 1.5rem; margin-left: 20px; }
    .faq-content { max-height: 0; overflow: hidden; transition: max-height 0.5s ease, padding 0.3s ease; color: #555; font-size: 1rem; line-height: 1.8; opacity: 0; }
    .faq-item.active .faq-content { max-height: 1000px; padding-bottom: 30px; opacity: 1; }
    .faq-item.active .faq-icon { transform: rotate(45deg); }

    /* --- 5. 通用動畫 --- */
    .reveal { opacity: 0; transform: translateY(30px); transition: 1s var(--transition-prime); }
    .reveal.revealed { opacity: 1; transform: translateY(0); }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // FAQ 手風琴邏輯
        const faqItems = document.querySelectorAll('.faq-item');
        faqItems.forEach(item => {
            const btn = item.querySelector('.faq-toggle');
            if (btn) {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const isActive = item.classList.contains('active');
                    faqItems.forEach(i => i.classList.remove('active'));
                    if (!isActive) item.classList.add('active');
                });
            }
        });

        // 揭幕動畫捲動監聽
        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('revealed');
                    revealObserver.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });

        document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
    });
</script>

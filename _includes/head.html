<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<meta name="google-site-verification" content="7521ccb19fc25690">

<title>
  {%- if page.title -%}
    {{ page.title | truncate: 60, '' }} | 祥安生命
  {%- else -%}
    祥安生命 | 24H 國家認證禮儀師・新北台北桃園專業殯葬服務
  {%- endif -%}
</title>

<meta name="description"
  content="{%- if page.description -%}{{ page.description | truncate: 155, '' }}{%- else -%}{{ site.description | truncate: 155, '' }}{%- endif -%}">

<meta name="robots"
  content="{%- if page.robots -%}{{ page.robots }}{%- else -%}index, follow{%- endif -%}">

<link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">

<meta property="og:type" content="{%- if page.layout == 'post' -%}article{%- else -%}website{%- endif -%}">
<meta property="og:title" content="{%- if page.title -%}{{ page.title | truncate: 60, '' }}{%- else -%}{{ site.title }}{%- endif -%}">
<meta property="og:description" content="{%- if page.description -%}{{ page.description | truncate: 155, '' }}{%- else -%}{{ site.description | truncate: 155, '' }}{%- endif -%}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:image" content="{%- if page.image -%}{{ page.image | absolute_url }}{%- else -%}{{ site.url }}{{ site.baseurl }}/images/og-default.jpg{%- endif -%}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:locale" content="zh_TW">

{%- if page.layout == 'post' -%}
<meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
<meta property="article:modified_time" content="{{ page.date | date_to_xmlschema }}">
<meta property="article:author" content="{{ site.author.name }}">
<meta property="article:section" content="{{ page.category }}">
{%- for tag in page.tags -%}<meta property="article:tag" content="{{ tag }}">{%- endfor -%}
{%- endif -%}

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{%- if page.title -%}{{ page.title | truncate: 60, '' }}{%- else -%}{{ site.title }}{%- endif -%}">
<meta name="twitter:description" content="{%- if page.description -%}{{ page.description | truncate: 155, '' }}{%- else -%}{{ site.description | truncate: 155, '' }}{%- endif -%}">
<meta name="twitter:image" content="{%- if page.image -%}{{ page.image | absolute_url }}{%- else -%}{{ site.url }}{{ site.baseurl }}/images/og-default.jpg{%- endif -%}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
</noscript>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">

<link rel="stylesheet" href="{{ site.baseurl }}/css/style.css">

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FuneralHome",
  "@id": "{{ site.url }}{{ site.baseurl }}/#organization",
  "name": "祥安生命有限公司",
  "alternateName": "祥安生命",
  "url": "{{ site.url }}{{ site.baseurl }}/",
  "logo": {
    "@type": "ImageObject",
    "url": "{{ site.url }}{{ site.baseurl }}/images/logo.png",
    "width": 200,
    "height": 60
  },
  "image": "{{ site.url }}{{ site.baseurl }}/images/og-default.jpg",
  "description": "祥安生命提供24小時國家認證禮儀師服務，費用透明定型化契約，專業服務北北基桃宜地區。",
  "telephone": "+886978583699",
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "永福街135巷13號",
    "addressLocality": "三重區",
    "addressRegion": "新北市",
    "postalCode": "241",
    "addressCountry": "TW"
  },
  "geo": {
    "@type": "GeoCoordinates",
    "latitude": 25.0652,
    "longitude": 121.4855
  },
  "openingHoursSpecification": {
    "@type": "OpeningHoursSpecification",
    "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
    "opens": "00:00",
    "closes": "23:59"
  },
  "priceRange": "NT$68,000 起",
  "hasOfferCatalog": {
    "@type": "OfferCatalog",
    "name": "禮儀服務項目",
    "itemListElement": [
      { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "尊嚴合約方案" } },
      { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "24小時接運安置" } },
      { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "精緻花禮代送" } }
    ]
  },
  "sameAs": ["https://www.facebook.com/ShianganLife"]
}
</script>

{%- if page.layout == 'post' -%}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{ page.title | truncate: 110, '' | xml_escape }}",
  "image": "{%- if page.image -%}{{ page.image | absolute_url }}{%- else -%}{{ site.url }}{{ site.baseurl }}/images/og-default.jpg{%- endif -%}",
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "author": {"@type": "Organization", "name": "祥安生命"},
  "publisher": {"@type": "Organization", "name": "祥安生命", "logo": {"@type": "ImageObject", "url": "{{ site.url }}{{ site.baseurl }}/images/logo.png"}}
}
</script>
{%- endif -%}

{%- if page.has_faq and page.faqs -%}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [{%- for faq in page.faqs -%}{"@type": "Question","name": "{{ faq.question | xml_escape }}","acceptedAnswer": {"@type": "Answer","text": "{{ faq.answer | xml_escape }}"}}{%- unless forloop.last -%},{%- endunless -%}{%- endfor -%}]
}
</script>
{%- endif -%}

{%- if site.company.ga4_id -%}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.company.ga4_id }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ site.company.ga4_id }}');
</script>
{%- endif -%}

<script src="{{ site.baseurl }}/js/script.js" defer></script>

<title>{% if page.title %}{{ page.title }} | 祥安生命{% else %}祥安生命 | 24H 國家認證禮儀師服務{% endif %}</title>

<meta property="og:title" content="祥安生命 | 喪葬費用公開透明">
<meta property="og:image" content="{{ '/images/logo.png' | relative_url }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">

<style>
    /* 全站基礎重設 - 防止跑版 */
    :root {
        --bg-master: #f2efeb;
        --accent: #a88e6a;
        --deep-ink: #1e1e1e;
        --text-main: #3d3d3d;
        --side-gap: clamp(1.25rem, 5vw, 8rem); 
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    html, body { 
        width: 100%;
        overflow-x: hidden; /* 徹底解決手機版左右晃動跑版 */
        background-color: var(--bg-master);
        color: var(--text-main);
        font-family: 'Noto Sans TC', sans-serif;
        line-height: 1.7;
    }

    /* 導覽列與主內容間距修正 */
    main { 
        padding-top: 80px; /* 依照您的 Navbar 高度調整 */
        min-height: 70vh;
    }

    .wrapper { 
        max-width: 1300px; 
        margin: 0 auto; 
        padding: 0 var(--side-gap); 
    }

    /* 首頁 Hero 修正 */
    .hero {
        position: relative;
        width: 100%;
        height: 75vh;
        min-height: 500px;
        display: flex;
        align-items: center;
        overflow: hidden;
    }

    .hero-bg {
        position: absolute;
        top: 0; right: 0;
        width: 100%; height: 100%;
        background: url('https://images.unsplash.com/photo-1494194123974-02393a002811?auto=format&fit=crop&q=80') center/cover no-repeat;
        z-index: 1;
        opacity: 0.2;
    }

    @media (min-width: 992px) {
        .hero-bg {
            width: 80%;
            opacity: 1;
            mask-image: linear-gradient(to left, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 100%);
        }
    }

    .hero-content {
        position: relative;
        z-index: 2;
        padding-left: var(--side-gap);
        max-width: 700px;
    }

    /* FAQ 手風琴基礎樣式 */
    .faq-item { border-bottom: 1px solid rgba(168, 142, 106, 0.2); }
    .faq-toggle { width: 100%; padding: 20px 0; background: none; border: none; display: flex; justify-content: space-between; cursor: pointer; font-size: 1.1rem; font-weight: 700; color: var(--deep-ink); text-align: left; }
    .faq-content { max-height: 0; overflow: hidden; transition: all 0.4s ease; opacity: 0; }
    .faq-item.active .faq-content { max-height: 500px; padding-bottom: 25px; opacity: 1; }

    /* 通用揭幕動畫 */
    .reveal { opacity: 0; transform: translateY(30px); transition: 1s cubic-bezier(0.2, 1, 0.3, 1); }
    .reveal.revealed { opacity: 1; transform: translateY(0); }
</style>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // FAQ Toggle
        document.querySelectorAll('.faq-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                const item = btn.closest('.faq-item');
                item.classList.toggle('active');
            });
        });

        // Scroll Reveal
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('revealed');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    });
</script>

<!-- ① charset + viewport（永遠最優先）-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
<meta http-equiv="X-UA-Compatible" content="IE=edge">


<script async src="https://www.googletagmanager.com/gtag/js?id=G-445583766"></script>
<script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-445583766'); 
</script>

<!-- ② Primary SEO -->
<title>
  {% if page.title %}
    {{ page.title | truncate: 60 }} | 祥安生命
  {% else %}
    祥安生命有限公司 | 24H 國家認證禮儀師・新北・台北・桃園
  {% endif %}
</title>
<meta name="description"
  content="{% if page.description %}{{ page.description | truncate: 155 }}{% else %}{{ site.description | truncate: 155 }}{% endif %}">
<meta name="robots" content="{% if page.robots %}{{ page.robots }}{% else %}index, follow{% endif %}">
<link rel="canonical"
  href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">

<!-- ③ Open Graph（Facebook / LINE 預覽）-->
<meta property="og:type"        content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
<meta property="og:title"       content="{% if page.title %}{{ page.title | truncate: 60 }}{% else %}{{ site.title }}{% endif %}">
<meta property="og:description" content="{% if page.description %}{{ page.description | truncate: 155 }}{% else %}{{ site.description | truncate: 155 }}{% endif %}">
<meta property="og:url"         content="{{ page.url | prepend: site.baseurl | prepend: site.url }}">
<meta property="og:image"
  content="{% if page.image %}{{ page.image | prepend: site.baseurl | prepend: site.url }}{% else %}{{ site.baseurl }}/images/og-default.jpg{% endif %}">
<meta property="og:image:width"  content="1200">
<meta property="og:image:height" content="630">
<meta property="og:site_name"   content="{{ site.title }}">
<meta property="og:locale"      content="zh_TW">
{% if page.layout == 'post' %}
<meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
<meta property="article:modified_time"  content="{{ page.date | date_to_xmlschema }}">
<meta property="article:author"         content="{{ site.author.name }}">
<meta property="article:section"        content="{{ page.category }}">
{% for tag in page.tags %}
<meta property="article:tag" content="{{ tag }}">
{% endfor %}
{% endif %}

<!-- ④ Twitter Card -->
<meta name="twitter:card"        content="summary_large_image">
<meta name="twitter:title"       content="{% if page.title %}{{ page.title | truncate: 60 }}{% else %}{{ site.title }}{% endif %}">
<meta name="twitter:description" content="{% if page.description %}{{ page.description | truncate: 155 }}{% else %}{{ site.description | truncate: 155 }}{% endif %}">
<meta name="twitter:image"
  content="{% if page.image %}{{ page.image | prepend: site.baseurl | prepend: site.url }}{% else %}{{ site.baseurl }}/images/og-default.jpg{% endif %}">

<!-- ⑤ Schema.org JSON-LD ── 全站 LocalBusiness（所有頁面）-->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FuneralHome",
  "@id": "{{ site.url }}{{ site.baseurl }}/#organization",
  "name": "{{ site.company.name }}",
  "url": "{{ site.url }}{{ site.baseurl }}/",
  "logo": {
    "@type": "ImageObject",
    "url": "{{ site.url }}{{ site.baseurl }}/images/logo.png"
  },
  "image": "{{ site.url }}{{ site.baseurl }}/images/og-default.jpg",
  "description": "{{ site.description }}",
  "telephone": "{{ site.company.phone }}",
  "address": {
    "@type": "PostalAddress",
    "streetAddress": "{{ site.company.address }}",
    "addressLocality": "{{ site.company.city }}",
    "addressRegion": "{{ site.company.region }}",
    "postalCode": "{{ site.company.postal_code }}",
    "addressCountry": "TW"
  },
  "geo": {
    "@type": "GeoCoordinates",
    "latitude": {{ site.company.lat }},
    "longitude": {{ site.company.lng }}
  },
  "openingHoursSpecification": {
    "@type": "OpeningHoursSpecification",
    "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
    "opens": "00:00",
    "closes": "23:59"
  },
  "areaServed": [
    "新北市", "台北市", "桃園市", "基隆市", "宜蘭縣"
  ],
  "priceRange": "NT$68,000 起",
  "sameAs": [
    "{{ site.company.facebook }}"
  ]
}
</script>

<!-- ⑥ Schema.org JSON-LD ── Article（僅 _posts 頁面）-->
{% if page.layout == 'post' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{ page.title | truncate: 110 }}",
  "description": "{{ page.description | truncate: 155 }}",
  "image": {
    "@type": "ImageObject",
    "url": "{% if page.image %}{{ page.image | prepend: site.baseurl | prepend: site.url }}{% else %}{{ site.url }}{{ site.baseurl }}/images/og-default.jpg{% endif %}",
    "width": 1200,
    "height": 630
  },
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "dateModified": "{{ page.date | date_to_xmlschema }}",
  "author": {
    "@type": "Organization",
    "name": "{{ site.company.name }}",
    "@id": "{{ site.url }}{{ site.baseurl }}/#organization"
  },
  "publisher": {
    "@type": "Organization",
    "name": "{{ site.company.name }}",
    "@id": "{{ site.url }}{{ site.baseurl }}/#organization",
    "logo": {
      "@type": "ImageObject",
      "url": "{{ site.url }}{{ site.baseurl }}/images/logo.png"
    }
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ page.url | prepend: site.baseurl | prepend: site.url }}"
  },
  "articleSection": "{{ page.category }}",
  "keywords": "{{ page.tags | join: ', ' }}"
}
</script>
{% endif %}

<!-- ⑦ Schema.org JSON-LD ── FAQPage（有 has_faq: true 的文章）-->
{% if page.has_faq and page.faqs %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {% for faq in page.faqs %}
    {
      "@type": "Question",
      "name": "{{ faq.question | xml_escape }}",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "{{ faq.answer | xml_escape }}"
      }
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
}
</script>
{% endif %}

<!-- ⑧ BreadcrumbList（_posts 頁面）-->
{% if page.layout == 'post' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "首頁",
      "item": "{{ site.url }}{{ site.baseurl }}/"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "殯葬百科知識",
      "item": "{{ site.url }}{{ site.baseurl }}/blog.html"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": "{{ page.title | truncate: 60 }}",
      "item": "{{ page.url | prepend: site.baseurl | prepend: site.url }}"
    }
  ]
}
</script>
{% endif %}

<!-- ⑨ GA4（正確 10 碼 ID，請填入 site.company.ga4_id）-->
{% if site.company.ga4_id and site.company.ga4_id != "8842890892" %}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.company.ga4_id }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ site.company.ga4_id }}', { 'anonymize_ip': true });
</script>
{% endif %}



<style>
    :root {
        --bg-master: #f2efeb;      /* 全站羊絨灰 */
        --accent: #a88e6a;         /* 職人金 */
        --deep-ink: #1e1e1e;       /* 石墨黑 */
        --text-main: #3d3d3d;      /* 炭灰 */
        --line-soft: rgba(168, 142, 106, 0.15);
        --side-gap: clamp(1.2rem, 6vw, 10rem); 
        --section-gap: clamp(50px, 8vh, 100px);
        --transition-prime: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; letter-spacing: 0.05em; }
    html, body { overflow-x: hidden; width: 100%; position: relative; scroll-behavior: smooth; }
    body {
        font-family: 'Noto Sans TC', sans-serif;
        background-color: var(--bg-master);
        color: var(--text-main);
        margin: 0; line-height: 1.8;
    }

    main { padding-top: 90px; }
    @media (max-width: 1100px) { main { padding-top: 80px; } }

    .watermark {
        position: absolute; font-family: 'Playfair Display', serif; 
        font-style: italic; font-size: clamp(5rem, 15vw, 15rem); 
        color: rgba(168, 142, 106, 0.04);
        white-space: nowrap; pointer-events: none; z-index: 0;
        user-select: none;
    }

    /* 首頁組件樣式 (保留在 head 確保渲染不閃爍) */
    .hero {
        height: 80vh; min-height: 600px; display: flex; align-items: center;
        padding: 0 var(--side-gap); position: relative; overflow: hidden;
    }
    .hero-bg {
        position: absolute; right: 0; top: 0; width: 85%; height: 100%;
        background: url('https://images.unsplash.com/photo-1494194123974-02393a002811?auto=format&fit=crop&q=80') center/cover;
        mask-image: linear-gradient(to left, black 50%, transparent 100%);
        -webkit-mask-image: linear-gradient(to left, black 50%, transparent 100%);
        z-index: 1; opacity: 0.95;
    }
    @media (max-width: 768px) { .hero-bg { width: 100%; opacity: 0.2; mask-image: none; } }
    
    .hero-content { position: relative; z-index: 10; max-width: 800px; }
    .hero h1 { font-family: 'Noto Serif TC', serif; font-size: clamp(2.5rem, 6vw, 4.5rem); line-height: 1.2; margin-bottom: 25px; color: var(--deep-ink); font-weight: 900; }

    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 40px var(--side-gap); background: rgba(255,255,255,0.3); border-top: 1px solid var(--line-soft); }
    @media (min-width: 1024px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
    .stat-box { text-align: center; border-left: 2px solid var(--accent); padding: 10px 0; }
    .stat-val { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--accent); font-style: italic; display: block; }
    .stat-lab { font-size: 0.8rem; letter-spacing: 2px; font-weight: 700; opacity: 0.7; }

    .section { padding: var(--section-gap) 0; position: relative; }
    .wrapper { max-width: 1400px; margin: 0 auto; padding: 0 var(--side-gap); }
    
    .flex-container { display: flex; flex-direction: column; gap: 60px; }
    @media (min-width: 1024px) { .flex-container { flex-direction: row; align-items: center; } }
    
    .img-holder { position: relative; flex: 1; }
    .img-holder img { width: 100%; border-radius: 2px; box-shadow: 20px 20px 0 var(--accent); transition: 0.5s; }
    .img-holder img:hover { transform: translate(-5px, -5px); box-shadow: 25px 25px 0 var(--accent); }

    .service-list { margin-top: 40px; border-top: 1px solid var(--line-soft); }
    .service-row { padding: 35px 0; border-bottom: 1px solid var(--line-soft); display: grid; grid-template-columns: 50px 1fr; gap: 20px; transition: 0.4s; cursor: pointer; text-decoration: none; color: inherit; }
    .service-row:hover { background: rgba(168, 142, 106, 0.05); padding-left: 15px; }
    .service-row .idx { color: var(--accent); font-family: 'Playfair Display', serif; font-size: 1.5rem; font-style: italic; }
    .service-row h3 { font-size: 1.8rem; margin: 0; font-family: 'Noto Serif TC', serif; }

    .faq-list { max-width: 900px; margin: 0 auto; }
    .faq-item { border-bottom: 1px solid var(--line-soft); padding: 5px 0; }
    .faq-toggle { width: 100%; padding: 25px 0; display: flex; justify-content: space-between; align-items: center; background: none; border: none; cursor: pointer; text-align: left; outline: none; }
    .faq-toggle h4 { font-size: 1.15rem; color: var(--deep-ink); margin: 0; flex: 1; font-family: 'Noto Sans TC', sans-serif; }
    .faq-icon { color: var(--accent); transition: transform 0.4s; font-size: 1.5rem; margin-left: 20px; display: flex; align-items: center; justify-content: center; width: 30px; }
    .faq-content { max-height: 0; overflow: hidden; transition: max-height 0.5s ease, padding 0.3s ease; color: #555; font-size: 1rem; line-height: 1.8; }
    .faq-item.active .faq-content { max-height: 1000px; padding-bottom: 30px; }
    .faq-item.active .faq-icon { transform: rotate(45deg); color: var(--deep-ink); }

    .reveal { opacity: 0; transform: translateY(30px); transition: 1s var(--transition-prime); }
    .reveal.revealed { opacity: 1; transform: translateY(0); }


/* 麵包屑通用樣式 */
.breadcrumb {
    padding: 13px var(--side);
    font-size: .82rem;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: var(--white);
    display: flex; 
    gap: 8px; 
    align-items: center;
}

.breadcrumb a { 
    color: var(--muted); 
    text-decoration: none; 
    transition: .2s; 
}

.breadcrumb a:hover { 
    color: var(--gold); 
}

.breadcrumb .current {
    color: var(--muted);
    pointer-events: none;
    opacity: 0.8; /* 稍微做一點視覺區隔 */
}
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // --- 1. FAQ 展開邏輯 (修正版) ---
        const faqItems = document.querySelectorAll('.faq-item');
        
        faqItems.forEach(item => {
            const btn = item.querySelector('.faq-toggle');
            if (btn) {
                btn.addEventListener('click', function(e) {
                    // 阻止按鈕預設行為
                    e.preventDefault();
                    
                    // 取得目前狀態
                    const isActive = item.classList.contains('active');
                    
                    // 先關閉所有其他的 FAQ (手風琴效果)
                    faqItems.forEach(otherItem => {
                        otherItem.classList.remove('active');
                    });
                    
                    // 如果原本是關閉的，則開啟它
                    if (!isActive) {
                        item.classList.add('active');
                    }
                });
            }
        });

        // --- 2. 捲動揭幕動畫 (Intersection Observer) ---
        const revealOptions = { 
            threshold: 0.1,
            rootMargin: "0px 0px -50px 0px" // 提前一點觸發
        };

        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('revealed');
                    // 觸發後就停止觀察該元素，節省效能
                    revealObserver.unobserve(entry.target);
                }
            });
        }, revealOptions);

        document.querySelectorAll('.reveal').forEach(el => {
            revealObserver.observe(el);
        });
    });
</script>

<style>
    :root {
        --bg-master: #f2efeb;      /* 全站羊絨灰 */
        --accent: #a88e6a;         /* 職人金 */
        --accent-gold: #c6a15b;    /* 點綴金 */
        --deep-ink: #1e1e1e;       /* 石墨黑 */
        --text-main: #3d3d3d;      /* 炭灰 */
        --line-soft: rgba(168, 142, 106, 0.15);
        --side-gap: clamp(1.2rem, 6vw, 10rem); 
        --section-gap: clamp(50px, 8vh, 100px);
        --transition-prime: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* 關鍵修正：解決鎖死無法下滑的問題 */
    html {
        margin: 0; padding: 0;
        width: 100%;
        overflow-x: hidden;
        overflow-y: auto !important; /* 強制解鎖垂直捲動 */
        scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch;
    }

    body {
        margin: 0; padding: 0;
        width: 100%;
        min-height: 100vh;
        background-color: var(--bg-master);
        color: var(--text-main);
        font-family: 'Noto Sans TC', sans-serif;
        line-height: 1.8;
        position: relative;
        overflow-x: hidden;
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; letter-spacing: 0.05em; }

    /* 通用佈局 */
    main { padding-top: 90px; display: block; width: 100%; }
    .wrapper { max-width: 1400px; margin: 0 auto; padding: 0 var(--side-gap); width: 100%; }
    .section { padding: var(--section-gap) 0; position: relative; width: 100%; }

    /* 首頁 Hero & 水印 */
    .watermark {
        position: absolute; font-family: 'Playfair Display', serif; 
        font-style: italic; font-size: clamp(5rem, 15vw, 15rem); 
        color: rgba(168, 142, 106, 0.04);
        white-space: nowrap; pointer-events: none; z-index: 0;
        user-select: none;
    }

    .hero {
        height: 80vh; min-height: 600px; display: flex; align-items: center;
        position: relative; overflow: hidden; width: 100%;
    }
    .hero-bg {
        position: absolute; right: 0; top: 0; width: 85%; height: 100%;
        background: url('https://images.unsplash.com/photo-1494194123974-02393a002811?auto=format&fit=crop&q=80') center/cover;
        mask-image: linear-gradient(to left, black 50%, transparent 100%);
        -webkit-mask-image: linear-gradient(to left, black 50%, transparent 100%);
        z-index: 1; opacity: 0.95;
    }
    @media (max-width: 768px) { .hero-bg { width: 100%; opacity: 0.2; mask-image: none; -webkit-mask-image: none; } }

    /* 統計網格 */
    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 40px var(--side-gap); background: rgba(255,255,255,0.3); border-top: 1px solid var(--line-soft); }
    @media (min-width: 1024px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
    .stat-box { text-align: center; border-left: 2px solid var(--accent); padding: 10px 0; }
    .stat-val { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--accent); font-style: italic; display: block; }

    /* FAQ 手風琴 */
    .faq-item { border-bottom: 1px solid var(--line-soft); }
    .faq-toggle { width: 100%; padding: 25px 0; display: flex; justify-content: space-between; align-items: center; background: none; border: none; cursor: pointer; text-align: left; }
    .faq-content { max-height: 0; overflow: hidden; transition: max-height 0.5s ease, opacity 0.3s ease; opacity: 0; }
    .faq-item.active .faq-content { max-height: 1000px; padding-bottom: 30px; opacity: 1; }
    .faq-icon { color: var(--accent); transition: transform 0.4s; font-size: 1.5rem; }
    .faq-item.active .faq-icon { transform: rotate(45deg); }

    /* 揭幕動畫基礎 */
    .reveal { opacity: 0; transform: translateY(30px); transition: 1s var(--transition-prime); }
    .reveal.revealed { opacity: 1; transform: translateY(0); }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 1. FAQ 邏輯
        const faqItems = document.querySelectorAll('.faq-item');
        faqItems.forEach(item => {
            const btn = item.querySelector('.faq-toggle');
            if (btn) {
                btn.addEventListener('click', () => {
                    const isActive = item.classList.contains('active');
                    faqItems.forEach(i => i.classList.remove('active'));
                    if (!isActive) item.classList.add('active');
                });
            }
        });

        // 2. Intersection Observer (揭幕動畫)
        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('revealed');
                    revealObserver.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });

        document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));
    });
</script>

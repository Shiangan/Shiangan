<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0, shrink-to-fit=no, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    {% seo %}
    <link rel="canonical" href="{{ page.url | absolute_url }}">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-445583766"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-445583766'); 
    </script>

    <link rel="icon" href="{{ '/images/logo.png' | relative_url }}" type="image/png">
    <link rel="apple-touch-icon" href="{{ '/images/logo.png' | relative_url }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;700;900&family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

    {% if page.url == "/" or page.url == "/index.html" %}
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "祥安生命有限公司",
        "url": "{{ site.url }}{{ site.baseurl }}/",
        "logo": "{{ site.url }}{{ site.baseurl }}/images/logo.png",
        "image": "{{ site.url }}{{ site.baseurl }}/images/logo.png",
        "telephone": "+886-978-583-699",
        "priceRange": "NT$",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "新北市三重區永福街135巷13號",
          "addressLocality": "新北",
          "postalCode": "241",
          "addressRegion": "TW"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": "25.076",
          "longitude": "121.482"
        },
        "openingHoursSpecification": {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"],
          "opens": "00:00",
          "closes": "23:59"
        }
      },
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "服務費用是否透明公開？",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "是的。祥安生命禮儀致力於價格透明化，所有費用與服務細節皆提供書面文件，鄭重承諾絕無任何隱藏費用。"
            }
          }
        ]
      }
    ]
    </script>

    <style>
        :root {
            --bg-master: #f2efeb; --accent: #a88e6a; --deep-ink: #1e1e1e;
            --text-main: #3d3d3d; --line-soft: rgba(168, 142, 106, 0.15);
            --side-gap: clamp(1.2rem, 6vw, 10rem); --section-gap: clamp(50px, 8vh, 100px);
            --transition-prime: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; letter-spacing: 0.05em; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--bg-master); color: var(--text-main); margin: 0; line-height: 1.8; overflow-x: hidden; }
        main { padding-top: 90px; }
        .hero { height: 80vh; min-height: 600px; display: flex; align-items: center; padding: 0 var(--side-gap); position: relative; overflow: hidden; }
        .hero-bg { position: absolute; right: 0; top: 0; width: 85%; height: 100%; background: url('https://images.unsplash.com/photo-1494194123974-02393a002811?auto=format&fit=crop&q=80') center/cover; mask-image: linear-gradient(to left, black 50%, transparent 100%); -webkit-mask-image: linear-gradient(to left, black 50%, transparent 100%); z-index: 1; opacity: 0.95; }
        .hero h1 { font-family: 'Noto Serif TC', serif; font-size: clamp(2.5rem, 6vw, 4.5rem); line-height: 1.2; font-weight: 900; color: var(--deep-ink); }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 40px var(--side-gap); background: rgba(255,255,255,0.3); border-top: 1px solid var(--line-soft); }
        @media (min-width: 1024px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
        .stat-box { text-align: center; border-left: 2px solid var(--accent); padding: 10px 0; }
        .stat-val { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--accent); font-style: italic; }
        .faq-item { border-bottom: 1px solid var(--line-soft); }
        .faq-toggle { width: 100%; padding: 25px 0; display: flex; justify-content: space-between; align-items: center; background: none; border: none; cursor: pointer; }
        .faq-content { max-height: 0; overflow: hidden; transition: max-height 0.5s ease; color: #555; }
        .faq-item.active .faq-content { max-height: 1000px; padding-bottom: 30px; }
        .reveal { opacity: 0; transform: translateY(30px); transition: 1s var(--transition-prime); }
        .reveal.revealed { opacity: 1; transform: translateY(0); }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const faqItems = document.querySelectorAll('.faq-item');
            faqItems.forEach(item => {
                const btn = item.querySelector('.faq-toggle');
                if(btn) {
                    btn.addEventListener('click', () => {
                        const isActive = item.classList.contains('active');
                        faqItems.forEach(i => i.classList.remove('active'));
                        if (!isActive) item.classList.add('active');
                    });
                }
            });
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('revealed');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        });
    </script>
    {% endif %}

    <meta name="format-detection" content="telephone=no">
</head>

<style>
    /* --- 墨綠金箔 Footer 核心樣式 --- */

        background: #1a241a; /* 深墨綠底色 */
        color: #ffffff;
        padding: 100px 0 40px;

    }

    /* 背景裝飾大字：解決層級問題，確保不遮擋點擊 */
    .footer-floating-text {
        position: absolute;
        top: -10px;
        left: 50%;
        transform: translateX(-50%);

        font-weight: 900;
        color: rgba(197, 160, 89, 0.05); /* 極淡金箔色 */

        letter-spacing: 25px;
        z-index: 0;
    }

    .footer-content {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 25px;
        position: relative;
        z-index: 1;
    }

    .footer-grid {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr 1.5fr;
        gap: 50px;
    }

    .footer-col h4 {
        color: #c5a059; /* 金箔色 */
        font-size: 1.1rem;
        margin-bottom: 25px;
        font-weight: 700;
        letter-spacing: 1px;
    }

    .footer-col a {
        color: rgba(255,255,255,0.7);
        text-decoration: none;
        transition: all 0.3s ease;
        display: inline-block;
        margin-bottom: 12px;
        font-size: 0.95rem;
    }

    .footer-col a:hover {
        color: #c5a059;
        transform: translateX(5px);
    }

    .footer-tel {
        font-size: 1.8rem !important;
        font-weight: 700;
        color: #c5a059 !important;
        display: block;
        margin: 10px 0 !important;
    }

    .footer-bottom {
        text-align: center;
        margin-top: 80px;
        opacity: 0.3;
        font-size: 0.8rem;
        border-top: 1px solid rgba(255,255,255,0.1);
        padding-top: 30px;
        letter-spacing: 2px;
    }

    /* 手機版 RWD 適應 */
    @media (max-width: 992px) {
        .footer-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 600px) {
        .footer-grid { grid-template-columns: 1fr; text-align: center; }
        .footer-col { text-align: center !important; }
        .footer-floating-text { font-size: 20vw; top: 20px; }
    }
</style>

<script>
    /**
     * 統整所有核心 JS：確保全站功能正常
     */
    document.addEventListener('DOMContentLoaded', () => {
        // 1. FAQ 點擊效果
        const faqItems = document.querySelectorAll('.faq-item');
        faqItems.forEach(item => {
            item.addEventListener('click', () => {
                const isActive = item.classList.contains('active');
                faqItems.forEach(i => i.classList.remove('active'));
                if (!isActive) item.classList.add('active');
                const icon = item.querySelector('i');
                if (icon) icon.className = isActive ? 'fas fa-plus' : 'fas fa-minus';
            });
        });

        // 2. 導覽列滾動效果
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (navbar) navbar.classList.toggle('scrolled', window.scrollY > 50);
        });

        // 3. 手機版菜單切換
        const menuBtn = document.querySelector('.menu-toggle');
        const navLinks = document.querySelector('.nav-links');
        if (menuBtn && navLinks) {
            menuBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                navLinks.classList.toggle('active');
            });
            document.addEventListener('click', () => navLinks.classList.remove('active'));
        }

        // 4. 流星效果
        const hero = document.getElementById('home') || document.getElementById('hero-space');
        if (hero) {
            setInterval(() => {
                const m = document.createElement('div');
                m.className = 'meteor';
                m.style.left = Math.random() * 100 + '%';
                m.style.top = Math.random() * 30 + '%';
                hero.appendChild(m);
                m.animate([
                    { transform: 'rotate(-35deg) translateX(0)', opacity: 0 },
                    { opacity: 1, offset: 0.2 },
                    { transform: 'rotate(-35deg) translateX(-1000px)', opacity: 0 }
                ], { duration: 2500, easing: 'linear' }).onfinish = () => m.remove();
            }, 3000);
        }
    });
</script>

# --------------------
# Jekyll 核心配置
# --------------------
permalink: /:title/   # 💡 建議改為 /:title/，這樣網址會更漂亮 (例如 about/ 而非 about.html)
timezone: Asia/Taipei
encoding: "utf-8"

# --------------------
# 分頁與插件
# --------------------
paginate: 10 
paginate_path: "/blog/page:num/"

# GitHub Pages 官方支援的插件宣告方式
plugins:
  - jekyll-paginate
  - jekyll-sitemap # 建議增加這個，對 SEO 很有幫助

# --------------------
# 檔案排除 (避免上傳不必要的檔案)
# --------------------
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

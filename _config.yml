# --------------------
# 基礎資訊設定
# --------------------
title: "祥安生命有限公司"
email: "ava85110@yahoo.com.tw"
description: "提供專業往生接體、喪葬補助申請協助、喪禮習俗流程諮詢等全方位生命服務。"
keywords: "祥安生命, 喪葬補助, 往生接體, 禮儀服務, 喪禮習俗"
author: "祥安生命" # 建議新增，SEO tag 會用到

# 💡 網址設定
url: "https://24hour.xn--kpry57d" 
baseurl: "" # 確定使用自定義網域，這裡維持空字串是正確的

# --------------------
# Jekyll 核心配置
# --------------------
# 採用日期路徑對搜尋引擎最友善
permalink: /blog/:year/:month/:day/:title/
timezone: Asia/Taipei
encoding: "utf-8"
markdown: kramdown # 確保使用標準 Markdown 引擎
highlighter: rouge # 確保代碼高亮正常（如果你文章中有放勞保/補助表格代碼）

# --------------------
# 內容目錄設定
# --------------------
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# --------------------
# 分頁與插件
# --------------------
paginate: 10 
paginate_path: "/blog/page:num/"

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag

# --------------------
# 檔案排除
# --------------------
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - .jekyll-metadata
  - README.md
  - LICENSE

---
layout: null
---
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    {% include head.html %}
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --sa-green: #2d3e2a; --sa-gold: #a68b5a; --sa-bg: #fdfaf5; --sa-text: #2c2c2c; }
        body { font-family: 'Noto Sans TC', sans-serif; color: var(--sa-text); line-height: 1.9; margin: 0; padding-top: 80px; }
        h1, h2, h3 { font-family: 'Noto Serif TC', serif; color: var(--sa-green); }
        .container { max-width: 1140px; margin: 0 auto; padding: 0 24px; }

        /* 文章 Hero */
        .post-hero { 
            height: 50vh; min-height: 400px;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('{{ page.image | relative_url }}') center/cover;
            display: flex; align-items: center; justify-content: center; color: #fff; text-align: center;
        }

        .layout-grid { display: flex; flex-wrap: wrap; gap: 60px; padding: 60px 0; }
        .post-main { flex: 1; min-width: 0; }
        .post-sidebar { width: 320px; }

        /* 排版組件 */
        .lead-text { font-size: 1.2rem; border-left: 5px solid var(--sa-gold); padding-left: 20px; margin-bottom: 40px; color: #444; }
        .table-wrap { width: 100%; overflow-x: auto; margin: 30px 0; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; min-width: 600px; border-collapse: collapse; background: #fff; }
        th { background: var(--sa-green); color: #fff; padding: 15px; }
        td { padding: 15px; border-bottom: 1px solid #eee; }

        /* 標籤按鈕 */
        .tag-pill { display: inline-block; padding: 5px 15px; border: 1px solid var(--sa-gold); color: var(--sa-gold); border-radius: 20px; text-decoration: none; margin: 5px; font-size: 0.9rem; transition: 0.3s; }
        .tag-pill:hover { background: var(--sa-gold); color: #fff; }

        /* 側邊欄諮詢卡 */
        .sticky-cta { position: sticky; top: 120px; background: var(--sa-green); color: #fff; padding: 40px 30px; border-radius: 12px; text-align: center; }
        .phone-link { font-size: 1.6rem; color: #fff; text-decoration: none; display: block; margin: 20px 0; font-weight: bold; }
        .cta-btn { background: var(--sa-gold); color: #fff; padding: 15px; display: block; text-decoration: none; border-radius: 5px; font-weight: bold; }

        @media (max-width: 992px) { .post-sidebar { width: 100%; } .post-hero { height: 40vh; } }
    </style>
</head>
<body>
    {% include header.html %}
    <div class="post-hero">
        <div class="container">
            <h1 style="font-size: clamp(2rem, 5vw, 3rem); color:#fff; margin:0;">{{ page.title }}</h1>
            <div style="margin-top:20px;">
                {% for tag in page.tags %}
                <a href="{{ '/blog-tag.html' | relative_url }}?tag={{ tag | url_encode }}" class="tag-pill">#{{ tag }}</a>
                {% endfor %}
            </div>
        </div>
    </div>

    <div class="container">
        <div class="layout-grid">
            <article class="post-main">
                <div class="lead-text">{{ page.description }}</div>
                <div class="entry-content">
                    {{ content }}
                </div>
                <div style="margin-top:50px; padding-top:30px; border-top:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
                    <a href="/blog.html" style="text-decoration:none; color:var(--sa-green); font-weight:bold;">← 返回百科列表</a>
                    <div>
                        分享文章：
                        <a href="https://social-plugins.line.me/lineit/share?url={{ page.url | absolute_url }}" target="_blank" style="color:#00b900; margin-left:10px;"><i class="fab fa-line fa-2x"></i></a>
                        <a href="https://www.facebook.com/sharer/sharer.php?u={{ page.url | absolute_url }}" target="_blank" style="color:#1877f2; margin-left:10px;"><i class="fab fa-facebook fa-2x"></i></a>
                    </div>
                </div>
            </article>

            <aside class="post-sidebar">
                <div class="sticky-cta">
                    <h3 style="color:var(--sa-gold); margin-top:0;">24H 禮儀諮詢</h3>
                    <p style="font-size:0.9rem; opacity:0.8;">面對親人往生感到茫然？<br>專業禮儀師全程引導諮詢。</p>
                    <a href="tel:0978583699" class="phone-link"><i class="fas fa-phone-alt"></i> 0978-583-699</a>
                    <a href="tel:0978583699" class="cta-btn">立即聯繫顧問</a>
                </div>
            </aside>
        </div>
    </div>
    {% include footer.html %}
</body>
</html>
